AND Lower(f_geometry_column) = Lower('geom')"


tools_knotentyp_anf: "
UPDATE schaechte SET knotentyp = 'Anfangsschacht' WHERE schaechte.schnam IN
(SELECT t_sch.schnam
FROM schaechte AS t_sch 
LEFT JOIN haltungen AS t_hob
ON t_sch.schnam = t_hob.schoben
LEFT JOIN haltungen AS t_hun
ON t_sch.schnam = t_hun.schunten
WHERE t_hun.pk IS NULL);"

tools_knotentyp_end: "
UPDATE schaechte SET knotentyp = 'Endschacht' WHERE schaechte.schnam IN
(SELECT t_sch.schnam
FROM schaechte AS t_sch 
JOIN haltungen AS t_hob                 /* nur Schaechte mit Haltung oben */
ON t_sch.schnam = t_hob.schunten
LEFT JOIN haltungen AS t_hun
ON t_sch.schnam = t_hun.schoben
WHERE t_hun.pk IS NULL);"

tools_knotentyp_hoch: "
UPDATE schaechte SET knotentyp = 'Hochpunkt' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hob
  ON t_sch.schnam = t_hob.schunten
  JOIN haltungen AS t_hun
  ON t_sch.schnam = t_hun.schoben
  JOIN schaechte AS t_sun
  ON t_sun.schnam = t_hun.schunten
  JOIN schaechte AS t_sob
  ON t_sob.schnam = t_hob.schunten
  WHERE ifnull(t_hob.sohleunten,t_sch.sohlhoehe)>ifnull(t_hob.sohleoben,t_sob.sohlhoehe) AND 
        ifnull(t_hun.sohleoben,t_sch.sohlhoehe)>ifnull(t_hun.sohleunten,t_sun.sohlhoehe));"

tools_knotentyp_tief: "
UPDATE schaechte SET knotentyp = 'Tiefpunkt' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hob
  ON t_sch.schnam = t_hob.schunten
  JOIN haltungen AS t_hun
  ON t_sch.schnam = t_hun.schoben
  JOIN schaechte AS t_sun
  ON t_sun.schnam = t_hun.schunten
  JOIN schaechte AS t_sob
  ON t_sob.schnam = t_hob.schunten
  WHERE ifnull(t_hob.sohleunten,t_sch.sohlhoehe)<ifnull(t_hob.sohleoben,t_sob.sohlhoehe) AND 
        ifnull(t_hun.sohleoben,t_sch.sohlhoehe)<ifnull(t_hun.sohleunten,t_sun.sohlhoehe));"

tools_knotentyp_zweig: "
UPDATE schaechte SET knotentyp = 'Verzweigung' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hun
  ON t_sch.schnam = t_hun.schoben
  GROUP BY t_sch.pk
  HAVING count(*) > 1);"

tools_knotentyp_einzel: "
UPDATE schaechte SET knotentyp = 'Einzelschacht' WHERE schaechte.schnam IN
( SELECT t_sch.schnam 
  FROM schaechte AS t_sch 
  LEFT JOIN haltungen AS t_hun
  ON t_sch.schnam = t_hun.schoben
  LEFT JOIN haltungen AS t_hob
  ON t_sch.schnam = t_hob.schunten
  WHERE t_hun.pk IS NULL AND t_hob.pk IS NULL)"

# Datenuebernahme aus Schaechten
tools_create_trig_new_hal: "
CREATE TRIGGER IF NOT EXISTS trig_new_hal
AFTER INSERT ON haltungen
BEGIN
    UPDATE haltungen 
    SET haltnam = q.haltnam 
    FROM (
        SELECT
            coalesce(new.haltnam, s.schnam || '.1') AS haltnam
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    ) AS q
    WHERE pk = new.pk;

    UPDATE haltungen SET
    (schoben, sohleoben) = (q.schoben, q.sohleoben)
    FROM (
        SELECT
            coalesce(new.schoben, s.schnam) AS schoben, 
            coalesce(new.sohleoben, s.sohlhoehe) AS sohleoben
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    ) AS q
    WHERE pk = new.pk;

    UPDATE haltungen SET
    (schunten, sohleunten) = (q.schunten, q.sohleunten)
    FROM (
        SELECT
            coalesce(new.schunten, s.schnam) AS schunten, 
            coalesce(new.sohleunten, s.sohlhoehe) AS sohleunten
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, -1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, -1))
    ) AS q
    WHERE pk = new.pk;
END;"

# Datenuebernahme aus Schaechten, dabei Schacht nur, wenn leer
tools_create_trig_mod_hal_nul: "
CREATE TRIGGER IF NOT EXISTS trig_mod_hal_nul
AFTER UPDATE OF geom ON haltungen
BEGIN
    UPDATE haltungen
    SET (schoben, sohleoben) = (coalesce(old.schnam, q.schnam), coalesce(old.sohleoben, q.sohlhoehe))
    FROM (
        SELECT
            s.schnam,
            s.sohlhoehe
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s ON TRUE
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = buffer(ST_PointN(new.geom, 1), 0.1))
    ) AS q
    WHERE pk = old.pk;

    UPDATE haltungen
    SET (schunten, sohleunten) = (coalesce(old.schnam, q.schnam), coalesce(old.sohleunten, q.sohlhoehe))
    FROM (
        SELECT
            s.schnam,
            s.sohlhoehe
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s ON TRUE
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, -1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = buffer(ST_PointN(new.geom, -1), 0.1))
    ) AS q
    WHERE pk = old.pk;
END;"

# Datenuebernahme aus Schaechten, dabei Schacht immer
tools_create_trig_mod_hal_all: "
CREATE TRIGGER IF NOT EXISTS trig_mod_hal_all
AFTER UPDATE OF geom ON haltungen
BEGIN
    UPDATE haltungen
    SET (schoben, sohleoben) = (coalesce(q.schnam, old.schoben), coalesce(old.sohleoben, q.sohlhoehe))
    FROM (
        SELECT
            s.schnam,
            s.sohlhoehe
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s ON TRUE
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    ) AS q
    WHERE pk = old.pk;

    UPDATE haltungen
    SET (schunten, sohleunten) = (coalesce(q.schnam, old.schunten), coalesce(NEW.sohleunten, old.sohleunten, q.sohlhoehe))
    FROM (
        SELECT
            s.schnam,
            s.sohlhoehe
        FROM (SELECT 1) AS temp
        LEFT JOIN schaechte AS s ON TRUE
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, -1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, -1))
    ) AS q
    WHERE pk = old.pk;
END;"

# Änderungen an der Profilbezeichnung in der Referenztabelle in Haltungen nachführen
tools_create_trig_ref_profile: "
CREATE TRIGGER IF NOT EXISTS trig_ref_profile AFTER UPDATE OF profilnam ON profile
BEGIN
    UPDATE haltungen
    SET profilnam = new.profilnam
    WHERE profilnam = old.profilnam AND profilnam IS NOT NULL;
    UPDATE anschlussleitungen
    SET profilnam = new.profilnam
    WHERE profilnam = old.profilnam AND profilnam IS NOT NULL;
END;"

