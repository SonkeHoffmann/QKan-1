qgsadapt_zoom: "
SELECT
    min(x) AS xmin,
    min(y) AS ymin,
    max(x) AS xmax,
    max(y) AS ymax
FROM (
    SELECT x(coalesce(geop, centroid(geom))) AS x, 
           y(coalesce(geop, centroid(geom))) AS y
    FROM schaechte
    UNION 
    SELECT x(centroid(geom)) AS x, 
           y(centroid(geom)) AS y
    FROM haltungen
)"

qgsadapt_proj: "
