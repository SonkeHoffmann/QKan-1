  tools_k_befahrung_26: |-
    SELECT
               haltnam,
               COUNT(*)
            FROM
               haltungen_untersucht
            GROUP BY
               haltnam
            HAVING COUNT(*) > 1
  tools_k_befahrung_41: |-
    SELECT
                   untersuchhal,
                   COUNT(*)
                FROM
                   untersuchdat_haltung
                WHERE kuerzel = 'BCD' and charakt1 = 'XP'
                GROUP BY
