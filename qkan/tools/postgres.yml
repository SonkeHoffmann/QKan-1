tools_knotentyp_anf: "
UPDATE schaechte SET knotentyp = 'Anfangsschacht' WHERE schaechte.schnam IN
(SELECT t_sch.schnam
FROM schaechte AS t_sch 
LEFT JOIN haltungen AS t_hob
ON t_sch.schnam = t_hob.schoben
LEFT JOIN haltungen AS t_hun
ON t_sch.schnam = t_hun.schunten
WHERE t_hun.pk IS NULL);"

tools_knotentyp_end: "
UPDATE schaechte SET knotentyp = 'Endschacht' WHERE schaechte.schnam IN
(SELECT t_sch.schnam
FROM schaechte AS t_sch 
JOIN haltungen AS t_hob                 /* nur Schaechte mit Haltung oben */
ON t_sch.schnam = t_hob.schunten
LEFT JOIN haltungen AS t_hun
ON t_sch.schnam = t_hun.schoben
WHERE t_hun.pk IS NULL);"

tools_knotentyp_hoch: "
UPDATE schaechte SET knotentyp = 'Hochpunkt' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hob
  ON qkan.t_sch.schnam = t_hob.schunten
  JOIN haltungen AS t_hun
  ON qkan.t_sch.schnam = t_hun.schoben
  JOIN schaechte AS t_sun
  ON qkan.t_sun.schnam = t_hun.schunten
  JOIN schaechte AS t_sob
  ON qkan.t_sob.schnam = t_hob.schunten
  WHERE ifnull(t_hob.sohleunten,t_sch.sohlhoehe)>ifnull(t_hob.sohleoben,t_sob.sohlhoehe) AND 
        ifnull(t_hun.sohleoben,t_sch.sohlhoehe)>ifnull(t_hun.sohleunten,t_sun.sohlhoehe));"

tools_knotentyp_tief: "
UPDATE schaechte SET knotentyp = 'Tiefpunkt' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hob
  ON qkan.t_sch.schnam = t_hob.schunten
  JOIN haltungen AS t_hun
  ON qkan.t_sch.schnam = t_hun.schoben
  JOIN schaechte AS t_sun
  ON qkan.t_sun.schnam = t_hun.schunten
  JOIN schaechte AS t_sob
  ON qkan.t_sob.schnam = t_hob.schunten
  WHERE ifnull(t_hob.sohleunten,t_sch.sohlhoehe)<ifnull(t_hob.sohleoben,t_sob.sohlhoehe) AND 
        ifnull(t_hun.sohleoben,t_sch.sohlhoehe)<ifnull(t_hun.sohleunten,t_sun.sohlhoehe));"

tools_knotentyp_zweig: "
UPDATE schaechte SET knotentyp = 'Verzweigung' WHERE schaechte.schnam IN
( SELECT t_sch.schnam
  FROM schaechte AS t_sch 
  JOIN haltungen AS t_hun
  ON qkan.t_sch.schnam = t_hun.schoben
  GROUP BY t_sch.pk
  HAVING count(*) > 1);"

tools_knotentyp_einzel: "
UPDATE schaechte SET knotentyp = 'Einzelschacht' WHERE schaechte.schnam IN
( SELECT t_sch.schnam 
  FROM schaechte AS t_sch 
  LEFT JOIN haltungen AS t_hun
  ON qkan.t_sch.schnam = t_hun.schoben
  LEFT JOIN haltungen AS t_hob
  ON qkan.t_sch.schnam = t_hob.schunten
  WHERE t_hun.pk IS NULL AND t_hob.pk IS NULL);"

# Datenuebernahme aus Schaechten
tools_haltungen_trigger_new: "
CREATE TRIGGER IF NOT EXISTS trig_new_hal
AFTER INSERT ON qkan.haltungen
BEGIN
    UPDATE haltungen 
    SET haltnam = (
        SELECT coalesce(new.haltnam, s.schnam || '.1') AS haltnam
        FROM schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    )
    WHERE pk = new.pk AND (haltnam = '' OR haltnam IS NULL);

    UPDATE haltungen SET
    (schoben, sohleoben) = (
        SELECT
            coalesce(new.schnam, s.schnam) AS schoben, 
            coalesce(new.sohleoben, old.sohleoben, s.sohlhoehe) AS sohleoben
        FROM schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    )
    WHERE pk = new.pk AND (schoben = '' OR schoben IS NULL);

    UPDATE haltungen SET
    (schunten, sohleunten) = (
        SELECT
            coalesce(new.schnam, s.schnam) AS schunten, 
            coalesce(new.sohleunten, old.sohleunten, s.sohlhoehe) AS sohleunten
        FROM schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, -1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, -1))
    )
    WHERE pk = new.pk AND (schunten = '' OR schunten IS NULL);
END;"

# Datenuebernahme aus Schaechten
tools_haltungen_trigger_mod: "
CREATE TRIGGER IF NOT EXISTS trig_mod_hal
AFTER UPDATE OF geom ON qkan.haltungen
BEGIN
    UPDATE haltungen
    SET (schoben, sohleoben) = 
    (   SELECT
            coalesce(s.schnam, OLD.schoben),
            coalesce(OLD.sohleoben, NEW.sohleoben, s.sohlhoehe)
        FROM schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, 1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, 1))
    )
    WHERE pk = old.pk;

    UPDATE haltungen
    SET (schunten, sohleunten) = 
    (   SELECT 
            coalesce(s.schnam, OLD.schunten),
            coalesce(OLD.sohleunten, NEW.sohleunten, s.sohlhoehe)
        FROM schaechte AS s
        WHERE ST_Within(s.geop, buffer(ST_PointN(new.geom, -1), 0.1)) = 1
        AND s.ROWID IN (
            SELECT ROWID
            FROM SpatialIndex
            WHERE f_table_name = 'schaechte'
                AND F_geometry_column = 'geop'
                AND search_frame = ST_PointN(new.geom, -1))
    )
    WHERE pk = old.pk;
END;"

# Änderungen an der Profilbezeichnung in der Referenztabelle in Haltungen nachführen
tools_trig_ref_profile: "
CREATE TRIGGER IF NOT EXISTS trig_ref_profile AFTER UPDATE OF profilnam ON qkan.profile
BEGIN
    UPDATE haltungen
    SET profilnam = new.profilnam
    WHERE profilnam = old.profilnam AND profilnam IS NOT NULL;
    UPDATE anschlussleitungen
    SET profilnam = new.profilnam
    WHERE profilnam = old.profilnam AND profilnam IS NOT NULL;
END;"

