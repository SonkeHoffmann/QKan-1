    SELECT {attr}, count(*) AS anzahl
    FROM {tab}
    GROUP BY {attr}
    HAVING anzahl > 1 OR {attr} IS NULL
)
UPDATE {tab}
SET {attr} = printf('{prefix}%d', ROWID)
