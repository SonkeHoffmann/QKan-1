params:
  x_func: x
  y_func: y
  pointn_func: PointN
  intersects_func: ST_Intersects
  haltungen_end_index_expr: -1
  anschlussleitungen_end_index_expr: -1
  haltungen_untersucht_end_index_expr: -1
  haltungen_untersucht_bewertet_end_index_expr: -1
  haltungen_untersucht_substanz_end_index_expr: -1
  anschlussleitungen_untersucht_end_index_expr: -1
  anschlussleitungen_untersucht_bewertet_end_index_expr: -1

queries:
  export_wehre: |
    SELECT
        haltnam,
        schoben,
        schunten,
        sohleunten,
        sohleoben,
        hoehe,
        breite,
        laenge,
        simstatus,
        kommentar
    FROM haltungen WHERE haltungstyp = 'Wehr' {abfrage_h_where}

  export_pumpen: |
    SELECT
        haltnam,
        sohleoben,
        schoben,
        schunten,
        simstatus,
        kommentar
    FROM haltungen WHERE haltungstyp = 'Pumpe' {abfrage_h_where}

  export_auslaesse: |
    SELECT
        schaechte.schnam,
        schaechte.deckelhoehe,
        schaechte.sohlhoehe,
        schaechte.durchm,
        {x_func}(schaechte.geop) AS xsch,
        {y_func}(schaechte.geop) AS ysch,
        schaechte.kommentar,
        schaechte.simstatus,
        ea.isybau,
        schaechte.strasse,
        schaechte.knotentyp,
        schaechte.baujahr,
        schaechte.material
    FROM schaechte
    LEFT JOIN Entwaesserungsarten AS ea
    ON schaechte.entwart = ea.bezeichnung
    WHERE schaechte.schachttyp = 'Auslass' {abfrage_s_and}

  export_auslaesse_vorlage: |
    SELECT
        schaechte.schnam,
