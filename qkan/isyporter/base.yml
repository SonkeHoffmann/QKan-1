  export_haltungen: |
    SELECT
        haltungen.haltnam,
        haltungen.schoben,
        haltungen.schunten,
        haltungen.hoehe,
        haltungen.breite,
        haltungen.laenge,
        haltungen.sohleoben,
        haltungen.sohleunten,
        haltungen.profilnam,
        haltungen.strasse,
        haltungen.material,
        ea.isybau,
        haltungen.ks,
        haltungen.simstatus,
        haltungen.kommentar,
        {x_func}({pointn_func}(haltungen.geom, 1)) AS xschob,
        {y_func}({pointn_func}(haltungen.geom, 1)) AS yschob,
        {x_func}({pointn_func}(haltungen.geom, {haltungen_end_index_expr})) AS xschun,
        {y_func}({pointn_func}(haltungen.geom, {haltungen_end_index_expr})) AS yschun,
        haltungen.baujahr,
        haltungen.aussendurchmesser,
        haltungen.profilauskleidung,
        haltungen.innenmaterial
    FROM haltungen
    LEFT JOIN Entwaesserungsarten AS ea
    ON haltungen.entwart = ea.bezeichnung {abfrage_h_where}

  export_anschlussleitungen_filtered: |
    WITH anschluss_haltung as(
        SELECT
            a.pk AS anschluss_id,
            haltungen.pk AS haltung_id
        FROM anschlussleitungen a
        JOIN haltungen
        ON {intersects_func}(a.geom, haltungen.geom)
        {abfrage_h_where}
    )
    SELECT
        anschlussleitungen.leitnam,
        anschlussleitungen.schoben,
        anschlussleitungen.schunten,
        anschlussleitungen.hoehe,
        anschlussleitungen.breite,
        anschlussleitungen.laenge,
        anschlussleitungen.sohleoben,
        anschlussleitungen.sohleunten,
        anschlussleitungen.profilnam,
        anschlussleitungen.material,
        ea.isybau,
        anschlussleitungen.ks,
        anschlussleitungen.simstatus,
        anschlussleitungen.kommentar,
        {x_func}({pointn_func}(anschlussleitungen.geom, 1)) AS xschob,
        {y_func}({pointn_func}(anschlussleitungen.geom, 1)) AS yschob,
        {x_func}({pointn_func}(anschlussleitungen.geom, {anschlussleitungen_end_index_expr})) AS xschun,
        {y_func}({pointn_func}(anschlussleitungen.geom, {anschlussleitungen_end_index_expr})) AS yschun
    FROM anschlussleitungen
    LEFT JOIN Entwaesserungsarten AS ea
    ON anschlussleitungen.entwart = ea.bezeichnung
    INNER JOIN anschluss_haltung ah
    ON anschlussleitungen.pk = ah.anschluss_id

