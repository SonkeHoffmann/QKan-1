        schaechte.baujahr,
        schaechte.material
    FROM schaechte
    LEFT JOIN Entwaesserungsarten AS ea
    ON schaechte.entwart = ea.bezeichnung
    WHERE schaechte.schachttyp = 'Auslass' {abfrage_s_and}

  export_schaechte: |
    SELECT
