isy_export_select_auslaesse: 
    SELECT
        schaechte.schnam,
        schaechte.deckelhoehe,
        schaechte.sohlhoehe,
        schaechte.durchm,
        x(schaechte.geop) AS xsch,
        y(schaechte.geop) AS ysch,
        schaechte.kommentar,
        schaechte.simstatus,
        ea.isybau,
        schaechte.strasse,
        schaechte.knotentyp,
        schaechte.baujahr,
        schaechte.material
    FROM schaechte
    LEFT JOIN Entwaesserungsarten AS ea
    ON schaechte.entwart = ea.bezeichnung
    WHERE schaechte.schachttyp = 'Auslass' {abfrage_s_and}
    
