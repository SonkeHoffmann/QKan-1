isy_update_schaechte_untersucht: 
    UPDATE schaechte_untersucht
    SET geop = s.geop, kommentar = s.kommentar
    FROM (
        SELECT schnam, geop, kommentar
        FROM schaechte 
    ) AS s
    WHERE schaechte_untersucht.schnam = s.schnam
    
isy_export_select_wehre: 
    SELECT
        haltnam,
        schoben,
        schunten,
        sohleunten,
        sohleoben,
        hoehe,
        breite,
        laenge,
        simstatus,
        kommentar
    FROM haltungen WHERE haltungstyp = 'Wehr' {abfrage_h_where}
    
