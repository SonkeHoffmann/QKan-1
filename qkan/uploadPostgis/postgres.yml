# SQL-Statements für PostgreSQL/PostGIS im uploadPostgis-Modul

# PostGIS Version abfragen
uploadPostgis_get_postgis_version: "
SELECT PostGIS_Version()"

# Prüfen ob Datenbank existiert
uploadPostgis_check_database_exists: "
SELECT 1 FROM pg_database WHERE datname = %s"

# Datenbank erstellen
uploadPostgis_create_database: "
CREATE DATABASE {database_name}"

# Alle verfügbaren Datenbanken auflisten
uploadPostgis_list_databases: "
SELECT datname 
FROM pg_database 
WHERE datistemplate = false 
AND datname NOT IN ('postgres', 'template0', 'template1')
ORDER BY datname"

# PostGIS Extension prüfen
uploadPostgis_check_postgis: "
SELECT EXISTS(
    SELECT 1 FROM pg_extension WHERE extname = 'postgis'
)"

# PostGIS Extension aktivieren
uploadPostgis_enable_postgis: "
CREATE EXTENSION IF NOT EXISTS postgis"

# Schema erstellen
uploadPostgis_create_schema: "
CREATE SCHEMA IF NOT EXISTS {schema_name}"

# Tabelle erstellen
uploadPostgis_create_table: "
CREATE TABLE {schema_name}.{table_name} ({column_definitions})"

# Primärschlüssel hinzufügen
uploadPostgis_add_primary_key: "
ALTER TABLE {schema_name}.{table_name} 
ADD CONSTRAINT pk_{table_name} PRIMARY KEY ({primary_key_columns})"

# Prüfen ob Tabelle existiert
uploadPostgis_check_table_exists: "
SELECT EXISTS (
    SELECT 1 FROM information_schema.tables 
    WHERE table_schema = %s AND table_name = %s
)"

# Tabelle löschen (für Overwrite)
uploadPostgis_drop_table: "
DROP TABLE IF EXISTS {schema_name}.{table_name} CASCADE"

# Geometrie-Spalte hinzufügen
uploadPostgis_add_geometry_column: "
SELECT AddGeometryColumn('{schema_name}', '{table_name}', '{geom_column}', {srid}, '{geom_type}', {coord_dimension})"

# Index auf Geometriespalte erstellen
uploadPostgis_create_spatial_index: "
CREATE INDEX IF NOT EXISTS idx_{table_name}_{geom_column}_gist 
ON {schema_name}.{table_name} USING GIST ({geom_column})"

# Anzahl der Datensätze zählen
uploadPostgis_count_records: "
SELECT COUNT(*) FROM {schema_name}.{table_name}"

# Vacuum und Analyze nach Import
uploadPostgis_vacuum_analyze: "
VACUUM ANALYZE {schema_name}.{table_name}"