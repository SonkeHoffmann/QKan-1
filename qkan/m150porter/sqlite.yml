m150_ex_haltungen_all: "
SELECT
    ha.haltnam,
    ha.schoben,
    ha.schunten,
    round(IIF(ha.hoehe>20, ha.hoehe/1000.0, ha.hoehe),1)    AS hoehe,
    round(IIF(ha.breite>20, ha.breite/1000.0, ha.breite),1) AS breite,
    round(coalesce(ha.laenge, glength(ha.geom),0),3)        AS laenge,
    round(ha.sohleoben,3) AS sohleoben,
    round(ha.sohleunten,3) AS sohleunten,
    pf.m150 AS profil,
    ha.strasse,
    ma.m150 AS material,
    ea.m150 AS entwart,
    si.m150                                                 AS simstatus,
    ha.baujahr,
    round(ha.aussendurchmesser,1) AS aussendurchmesser,
    ha.profilauskleidung,
    mi.m150 AS innenmaterial,
    round(x(PointN(ha.geom, 1)),3) AS xschob,
    round(y(PointN(ha.geom, 1)),3) AS yschob,
    round(x(PointN(ha.geom, -1)),3) AS xschun,
    round(y(PointN(ha.geom, -1)),3) AS yschun,
    ha.kommentar
FROM haltungen AS ha
JOIN (SELECT bezeichnung, m150 FROM entwaesserungsarten GROUP BY bezeichnung) AS ea 
                                    ON ha.entwart = ea.bezeichnung
JOIN (SELECT profilnam, m150 FROM profile GROUP BY profilnam) AS pf
                                    ON ha.profilnam = pf.profilnam
LEFT JOIN (SELECT bezeichnung, m150 FROM material GROUP BY bezeichnung) AS ma
                                    ON ha.material = ma.bezeichnung
LEFT JOIN (SELECT bezeichnung, m150 FROM material GROUP BY bezeichnung) AS mi
                                    ON ha.innenmaterial = mi.bezeichnung
LEFT JOIN (SELECT bezeichnung, m150 FROM simulationsstatus GROUP BY bezeichnung) AS si
                                    ON ha.simstatus = si.bezeichnung
WHERE (haltungstyp = 'Haltung' OR haltungstyp IS NULL)
"

m150_count_haltungen_all: "
SELECT count() AS anz
FROM haltungen AS ha
JOIN (SELECT bezeichnung, m150 FROM entwaesserungsarten GROUP BY bezeichnung) AS ea 
                                    ON ha.entwart = ea.bezeichnung
JOIN (SELECT profilnam, m150 FROM profile GROUP BY profilnam) AS pf
                                    ON ha.profilnam = pf.profilnam
"

