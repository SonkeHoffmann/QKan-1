# Anschlussleitungen werden indirekt über Haltungen selektiert
m150_ex_anschlussleitungen_sel: "
WITH sel AS (
    SELECT al.pk
    FROM anschlussleitungen AS al
    JOIN haltungen AS ha ON al.haltnam = ha.haltnam
    JOIN sel_haltungen AS sel ON sel.pk = ha.pk
)
SELECT
    al.leitnam,
    al.schoben,
    al.schunten,
    al.hoehe,
    al.breite,
    al.laenge,
    al.sohleoben,
    al.sohleunten,
    pf.m150 AS profil,
    ma.m150 AS material,
    ea.m150 AS entwart,
    si.m150 AS simstatus,
    round(x(PointN(al.geom, 1)),3) AS xschob,
    round(y(PointN(al.geom, 1)),3) AS yschob,
    round(x(PointN(al.geom, -1)),3) AS xschun,
    round(y(PointN(al.geom, -1)),3) AS yschun,
    al.baujahr,
    al.aussendurchmesser,
    al.profilauskleidung,
    mi.m150 AS innenmaterial,
    al.kommentar
FROM anschlussleitungen AS al
JOIN sel                            ON sel.pk = al.pk
JOIN (SELECT bezeichnung, m150 FROM entwaesserungsarten GROUP BY bezeichnung) AS ea 
                                    ON al.entwart = ea.bezeichnung
JOIN (SELECT profilnam, m150 FROM profile GROUP BY profilnam) AS pf
                                    ON al.profilnam = pf.profilnam
JOIN (SELECT bezeichnung, m150 FROM material GROUP BY bezeichnung) AS ma
                                    ON al.material = ma.bezeichnung
JOIN (SELECT bezeichnung, m150 FROM material GROUP BY bezeichnung) AS mi
                                    ON al.innenmaterial = mi.bezeichnung
JOIN (SELECT bezeichnung, m150 FROM simulationsstatus GROUP BY bezeichnung) AS si
                                    ON al.simstatus = si.bezeichnung
WHERE pf.m150 IS NOT NULL
  AND ea.m150 IS NOT NULL
  AND ma.m150 IS NOT NULL
  AND mi.m150 IS NOT NULL
  AND si.m150 IS NOT NULL
"

