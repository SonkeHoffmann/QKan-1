m150_ex_schaechte_all: "
SELECT
    sc.schnam,
    round(sc.deckelhoehe,3)         AS deckelhoehe,
    round(sc.sohlhoehe,3)           AS sohlhoehe,
    round(sc.durchm,1)              AS durchm,
    ea.m150                         AS entwart,
    sc.baujahr,
    si.m150                         AS simstatus,
    round(x(sc.geop),3)             AS xsch,
    round(y(sc.geop),3)             AS ysch,
    sc.kommentar
FROM schaechte AS sc
JOIN (SELECT bezeichnung, m150 FROM entwaesserungsarten GROUP BY bezeichnung) AS ea
                                    ON sc.entwart = ea.bezeichnung
JOIN (SELECT bezeichnung, m150 FROM simulationsstatus GROUP BY bezeichnung) AS si
                                    ON sc.simstatus = si.bezeichnung
WHERE sc.schachttyp = :schachttyp
"

m150_count_schaechte_all: "
