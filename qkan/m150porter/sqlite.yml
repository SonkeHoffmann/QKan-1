# Wehre sind in M150 Knoten aber in QKan Haltungen
m150_ex_halwp_all: "
WITH ea AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_entwaesserungsarten'
    GROUP BY bezqkan
),
ma AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_material'
    GROUP BY bezqkan
),
si AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_simulationsstatus'
    GROUP BY bezqkan
),
ba AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_bauwerksarten'
    GROUP BY bezqkan
),
st AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'strassen'
    GROUP BY bezqkan
),
ka AS (
    SELECT kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_knotentypen'
      AND bezqkan = 'Schacht'
    GROUP BY bezqkan
)
SELECT
    ha.schoben,
    round(sc.deckelhoehe,3)                         AS deckelhoehe,
    round(coalesce(sc.sohlhoehe, ha.sohleoben),3)   AS sohlhoehe,
    round(sc.deckelhoehe - coalesce(sc.sohlhoehe, ha.sohleoben),3) AS tiefe,
    ka.kuerzel              AS knotenart,
    round(sc.durchm,1)      AS durchm,
    ea.kuerzel              AS entwart,
    st.kuerzel              AS strasse,
    sc.strasse              AS strassenname,
    sc.baujahr,
    ba.kuerzel              AS bauwerksart,
    si.kuerzel              AS simstatus,
    ma.kuerzel              AS material,
    ha.kommentar,
    AsBinary(sc.geom)       AS geoline,
    AsBinary(sc.geop)       AS geopoint
FROM haltungen AS ha
JOIN ka ON True
JOIN schaechte AS sc ON sc.schnam = ha.schoben
JOIN ea ON ea.bezqkan = ha.entwart
LEFT JOIN ma ON ma.bezqkan = ha.material
LEFT JOIN si ON si.bezqkan = ha.simstatus
LEFT JOIN ba ON ba.bezqkan = sc.knotentyp
LEFT JOIN st ON st.bezqkan = ha.strasse
WHERE haltungstyp = ':bauwerkstyp';"

