GROUP BY ru.bezqkan, ru.subject;"

m150_im_stationierung_umkehren: "
UPDATE anschlussleitungen
SET ursprung = q.ursprung
FROM (
    SELECT ha.laenge - al.ursprung AS ursprung
    FROM haltungen AS ha
    JOIN anschlussleitungen AS al ON al.haltnam = ha.haltnam
    WHERE al.pk = :leitnam
) AS q
WHERE anschlussleitungen.pk = :leitnam;"

m150_im_ha_umkehren: "
UPDATE anschlussleitungen
SET geom = q.geom
FROM (
    SELECT al.pk, ST_Reverse(al.geom) AS geom
    FROM haltungen AS ha
    JOIN anschlussleitungen AS al ON al.haltnam = ha.haltnam
    WHERE ST_Distance(PointN(ha.geom, 1), al.geom) < ST_Distance(PointN(al.geom, -1), ha.geom)
) AS q
WHERE anschlussleitungen.pk = q.pk;"

