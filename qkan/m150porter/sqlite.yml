    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_material'
    GROUP BY bezqkan
),
mi AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_material'
    GROUP BY bezqkan
),
si AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_simulationsstatus'
    GROUP BY bezqkan
),
st AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'strassen'
    GROUP BY bezqkan
),
ka AS (
    SELECT kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_knotentypen'
      AND bezqkan = 'Anschlussschacht'
    GROUP BY bezqkan
)
SELECT
    al.leitnam,
    al.schoben AS asoben,
    al.schunten AS asunten,
    al.haltnam,
    ha.schoben AS haoben,
    ha.schunten AS haunten,
    al.urstation,
    iif(lageanschluss IS NULL, NULL, printf('%02d', al.lageanschluss)) AS lageanschluss,
    ka.kuerzel AS knotenart,
    al.hoehe,
    al.breite,
    al.laenge,
    al.sohleoben,
    al.sohleunten,
    st.kuerzel AS strasse,
    al.strasse AS strassenname,
    pf.kuerzel AS profil,
    ma.kuerzel AS material,
    ea.kuerzel AS entwart,
    si.kuerzel AS simstatus,
    al.baujahr,
    al.aussendurchmesser,
    al.profilauskleidung,
    mi.kuerzel AS innenmaterial,
    al.kommentar,
    AsBinary(al.geom) AS gline
FROM anschlussleitungen AS al
JOIN ha      ON ha.pk = al.pk
JOIN ka ON True
JOIN ea ON ea.bezqkan = al.entwart
