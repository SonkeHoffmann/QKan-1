# Alle Daten in refdata aus dem Import für Export hinzufügen, falls noch nicht vorhanden
m150_insert_refdatafromimport: "
INSERT INTO refdata (bezqkan, bezext, kuerzel, modul, subject, kommentar, createdat)
SELECT
    rd.bezqkan,
    rd.bezext,
    rd.kuerzel,
    rd.modul,
    'export_' || rd.thema AS subject,
    'erzeugt aus import_simulationsstatus' AS kommentar,
    CURRENT_TIMESTAMP AS createdat
FROM (
    SELECT
        bezqkan,
        bezext,
        kuerzel,
        modul,
        substr(subject, 8) AS thema
    FROM refdata
    WHERE modul = 'm150porter' AND substr(subject, 1, 6) = 'import'
) AS rd
LEFT JOIN (
    SELECT pk,
        bezqkan,
        substr(subject, 8) AS thema
    FROM refdata
    WHERE modul = 'm150porter' AND substr(subject, 1, 6) = 'export'
) AS nd
ON nd.thema = rd.thema AND nd.bezqkan = rd.bezqkan
WHERE nd.pk IS NULL;"

