m150_ex_haltungen_all: "
WITH ea AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_entwaesserungsarten'
    GROUP BY bezqkan
),
pf AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_profile'
    GROUP BY bezqkan
),
ma AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_material'
    GROUP BY bezqkan
),
mi AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_material'
    GROUP BY bezqkan
),
si AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'export_simulationsstatus'
    GROUP BY bezqkan
),
st AS (
    SELECT bezqkan, kuerzel
    FROM refdata
    WHERE modul = 'm150porter'
      AND subject = 'strassen'
    GROUP BY bezqkan
)
SELECT
    ha.haltnam,
    ha.schoben,
    ha.schunten,
    round(IIF(ha.hoehe>20, ha.hoehe, ha.hoehe*1000.0),1)    AS hoehe,
    round(IIF(ha.breite>20, ha.breite, ha.breite*1000.0),1) AS breite,
    ha.laenge, 
    round(glength(ha.geom),3)                               AS rohrlaenge,
    round(ha.sohleoben,3) AS sohleoben,
    round(ha.sohleunten,3) AS sohleunten,
    pf.kuerzel                                              AS profil,
    st.kuerzel                                              AS strasse,
    ha.strasse                                              AS strassennname,
    ma.kuerzel                                              AS material,
    ea.kuerzel                                              AS entwart,
    ha.baujahr,
    ha.profilauskleidung,
    mi.kuerzel                                              AS innenmaterial,
    si.kuerzel                                              AS simstatus,
    ha.kommentar,
    AsBinary(ha.geom) AS gline
FROM haltungen AS ha
JOIN ea ON ea.bezqkan = ha.entwart
JOIN pf ON pf.bezqkan = ha.profilnam
LEFT JOIN ma ON ma.bezqkan = ha.material
LEFT JOIN mi ON mi.bezqkan = ha.innenmaterial
LEFT JOIN si ON si.bezqkan = ha.simstatus
LEFT JOIN st ON st.bezqkan = ha.strasse
WHERE (haltungstyp = 'Haltung' OR haltungstyp IS NULL);"

