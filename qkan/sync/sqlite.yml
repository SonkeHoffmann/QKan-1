    datenart = mo.datenart,
    auftragsbezeichnung = mo.auftragsbezeichnung,
    max_ZD = mo.max_ZD,
    max_ZB = mo.max_ZB,
    max_ZS = mo.max_ZS,
    xschob = mo.xschob,
    yschob = mo.yschob,
    xschun = mo.xschun,
    yschun = mo.yschun,
    kommentar = mo.kommentar,
    geom = mo.geom
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.bezugspunkt IS NOT NULL AND sy.bezugspunkt <> '', ex.bezugspunkt, be.bezugspunkt) AS bezugspunkt,
        iif(sy.schoben IS NOT NULL AND sy.schoben <> '', ex.schoben, be.schoben) AS schoben,
        iif(sy.schunten IS NOT NULL AND sy.schunten <> '', ex.schunten, be.schunten) AS schunten,
        iif(sy.hoehe IS NOT NULL, ex.hoehe, be.hoehe) AS hoehe,
        iif(sy.breite IS NOT NULL, ex.breite, be.breite) AS breite,
        iif(sy.laenge IS NOT NULL, ex.laenge, be.laenge) AS laenge,
        iif(sy.baujahr IS NOT NULL, ex.baujahr, be.baujahr) AS baujahr,
        iif(sy.id IS NOT NULL, ex.id, be.id) AS id,
        iif(sy.untersuchtag IS NOT NULL AND sy.untersuchtag <> '', ex.untersuchtag, be.untersuchtag) AS untersuchtag,
        iif(sy.untersucher IS NOT NULL AND sy.untersucher <> '', ex.untersucher, be.untersucher) AS untersucher,
        iif(sy.untersuchrichtung IS NOT NULL AND sy.untersuchrichtung <> '', ex.untersuchrichtung, be.untersuchrichtung) AS untersuchrichtung,
        iif(sy.wetter IS NOT NULL, ex.wetter, be.wetter) AS wetter,
        iif(sy.bewertungsart IS NOT NULL AND sy.bewertungsart <> '', ex.bewertungsart, be.bewertungsart) AS bewertungsart,
        iif(sy.bewertungstag IS NOT NULL AND sy.bewertungstag <> '', ex.bewertungstag, be.bewertungstag) AS bewertungstag,
        iif(sy.strasse IS NOT NULL AND sy.strasse <> '', ex.strasse, be.strasse) AS strasse,
        iif(sy.datenart IS NOT NULL AND sy.datenart <> '', ex.datenart, be.datenart) AS datenart,
        iif(sy.auftragsbezeichnung IS NOT NULL AND sy.auftragsbezeichnung <> '', ex.auftragsbezeichnung, be.auftragsbezeichnung) AS auftragsbezeichnung,
        iif(sy.max_ZD IS NOT NULL, ex.max_ZD, be.max_ZD) AS max_ZD,
        iif(sy.max_ZB IS NOT NULL, ex.max_ZB, be.max_ZB) AS max_ZB,
        iif(sy.max_ZS IS NOT NULL, ex.max_ZS, be.max_ZS) AS max_ZS,
        iif(sy.xschob IS NOT NULL, ex.xschob, be.xschob) AS xschob,
        iif(sy.yschob IS NOT NULL, ex.yschob, be.yschob) AS yschob,
        iif(sy.xschun IS NOT NULL, ex.xschun, be.xschun) AS xschun,
        iif(sy.yschun IS NOT NULL, ex.yschun, be.yschun) AS yschun,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geom, be.geom) AS geom
    FROM sync_anschlussleitungen_untersucht AS sy
    JOIN main.anschlussleitungen_untersucht AS be ON be.pk = sy.pk_best
    JOIN ext.anschlussleitungen_untersucht AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.anschlussleitungen_untersucht.pk = mo.pk_best;"

