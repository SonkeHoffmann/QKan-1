    iif(be.speicherzahl <> ex.speicherzahl, printf('%d -> %d', be.speicherzahl, ex.speicherzahl), NULL) AS speicherzahl,
    iif(coalesce(abs(be.speicherkonst - ex.speicherkonst), 0) > 0.001, printf('%.3f -> %.3f', be.speicherkonst, ex.speicherkonst), NULL) AS speicherkonst,
