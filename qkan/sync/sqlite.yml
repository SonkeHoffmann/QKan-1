sync_schaechte_dif: "
INSERT INTO sync_schaechte (
    pk_best, pk_ext, schnam, punktobjekt, grafikobjekt, aktion, status, 
    sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche, entwart, 
    strasse, baujahr, eigentum, teilgebiet, knotentyp, auslasstyp, schachttyp, 
    simstatus, material, xsch, ysch, kommentar, createdat, geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.schnam,
    iif(ex.geop <> be.geop, printf('Geometrie geändert.'), NULL) AS punktobjekt,
    iif(ex.geom <> be.geom, printf('Geometrie geändert.'), NULL) AS grafikobjekt,
    'ändern' AS aktion,
    1 AS status,
    iif(coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001, printf('%s -> %s', be.sohlhoehe, ex.sohlhoehe), NULL) AS sohlhoehe,
    iif(coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001, printf('%s -> %s', be.deckelhoehe, ex.deckelhoehe), NULL) AS deckelhoehe,
    iif(coalesce(abs(be.durchm - ex.durchm), 0) > 0.001, printf('%s -> %s', be.durchm, ex.durchm), NULL) AS durchm,
    iif(be.druckdicht <> ex.druckdicht, printf('%s -> %s', be.druckdicht, ex.druckdicht), NULL) AS druckdicht,
    iif(coalesce(abs(be.ueberstauflaeche - ex.ueberstauflaeche), 0) > 0.1, printf('%s -> %s', be.ueberstauflaeche, ex.ueberstauflaeche), NULL) AS ueberstauflaeche,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.baujahr <> ex.baujahr, printf('%s -> %s', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.eigentum <> ex.eigentum, printf('%s -> %s', be.eigentum, ex.eigentum), NULL) AS eigentum,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.knotentyp <> ex.knotentyp, printf('%s -> %s', be.knotentyp, ex.knotentyp), NULL) AS knotentyp,
    iif(be.auslasstyp <> ex.auslasstyp, printf('%s -> %s', be.auslasstyp, ex.auslasstyp), NULL) AS auslasstyp,
