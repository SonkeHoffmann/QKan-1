# Anschlussleitungen_Untersucht, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_anschlussleitungen_untersucht_ext: "
INSERT INTO sync_anschlussleitungen_untersucht (
    pk_best, pk_ext, leitnam, objekt, aktion, status,
    bezugspunkt, schoben, schunten, hoehe, breite, laenge, baujahr, id,
