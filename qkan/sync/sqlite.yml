    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.flnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(be.neigkl <> ex.neigkl, printf('%d -> %d', be.neigkl, ex.neigkl), NULL) AS neigkl,
    iif(coalesce(abs(be.neigung - ex.neigung), 0) > 0.001, printf('%.3f -> %.3f', be.neigung, ex.neigung), NULL) AS neigung,
    iif(coalesce(abs(be.befgrad - ex.befgrad), 0) > 0.001, printf('%.3f -> %.3f', be.befgrad, ex.befgrad), NULL) AS befgrad,
    iif(coalesce(abs(be.schwerpunktlaufzeit - ex.schwerpunktlaufzeit), 0) > 0.001, printf('%.3f -> %.3f', be.schwerpunktlaufzeit, ex.schwerpunktlaufzeit), NULL) AS schwerpunktlaufzeit,
    iif(be.regenschreiber <> ex.regenschreiber, printf('%s -> %s', be.regenschreiber, ex.regenschreiber), NULL) AS regenschreiber,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.abflussparameter <> ex.abflussparameter, printf('%s -> %s', be.abflussparameter, ex.abflussparameter), NULL) AS abflussparameter,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.tezg AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.tezg AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS ex
ON ex.flnam = be.flnam
WHERE
    be.haltnam <> ex.haltnam OR
    be.schnam <> ex.schnam OR
    be.neigkl <> ex.neigkl OR
    coalesce(abs(be.neigung - ex.neigung), 0) > 0.001 OR
    coalesce(abs(be.befgrad - ex.befgrad), 0) > 0.001 OR
    coalesce(abs(be.schwerpunktlaufzeit - ex.schwerpunktlaufzeit), 0) > 0.001 OR
    be.regenschreiber <> ex.regenschreiber OR
    be.teilgebiet <> ex.teilgebiet OR
    be.abflussparameter <> ex.abflussparameter OR
    be.kommentar <> ex.kommentar OR
    be.geom <> ex.geom;"

# Tezg hinzufügen
sync_tezg_add: "
INSERT INTO main.tezg (
    flnam, haltnam, schnam, neigkl, neigung, befgrad, schwerpunktlaufzeit,
    regenschreiber, teilgebiet, abflussparameter, kommentar,
    geom)
SELECT
    ex.flnam, ex.haltnam, ex.schnam, ex.neigkl, ex.neigung, ex.befgrad,
    ex.schwerpunktlaufzeit, ex.regenschreiber, ex.teilgebiet,
    ex.abflussparameter, ex.kommentar,
    ex.geom AS geom
FROM ext.tezg AS ex
JOIN sync_tezg AS sy ON ex.pk = sy.pk_ext
WHERE sy.aktion = 'hinzufügen' 
  AND sy.status;"

# Tezg löschen
sync_tezg_del: "
DELETE FROM main.tezg
WHERE pk IN (
    SELECT pk_best
    FROM sync_tezg
    WHERE aktion = 'löschen'
      AND status
);"

# Tezg ändern
sync_tezg_mod: "
UPDATE main.tezg
SET
    haltnam = mo.haltnam,
    schnam = mo.schnam,
    neigkl = mo.neigkl,
    neigung = mo.neigung,
    befgrad = mo.befgrad,
    schwerpunktlaufzeit = mo.schwerpunktlaufzeit,
    regenschreiber = mo.regenschreiber,
    teilgebiet = mo.teilgebiet,
    abflussparameter = mo.abflussparameter,
    kommentar = mo.kommentar,
    geom = mo.geom
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.haltnam IS NOT NULL AND sy.haltnam <> '', ex.haltnam, be.haltnam) AS haltnam,
        iif(sy.schnam IS NOT NULL AND sy.schnam <> '', ex.schnam, be.schnam) AS schnam,
        iif(sy.neigkl IS NOT NULL, ex.neigkl, be.neigkl) AS neigkl,
        iif(sy.neigung IS NOT NULL, ex.neigung, be.neigung) AS neigung,
        iif(sy.befgrad IS NOT NULL, ex.befgrad, be.befgrad) AS befgrad,
        iif(sy.schwerpunktlaufzeit IS NOT NULL, ex.schwerpunktlaufzeit, be.schwerpunktlaufzeit) AS schwerpunktlaufzeit,
        iif(sy.regenschreiber IS NOT NULL AND sy.regenschreiber <> '', ex.regenschreiber, be.regenschreiber) AS regenschreiber,
        iif(sy.teilgebiet IS NOT NULL AND sy.teilgebiet <> '', ex.teilgebiet, be.teilgebiet) AS teilgebiet,
        iif(sy.abflussparameter IS NOT NULL AND sy.abflussparameter <> '', ex.abflussparameter, be.abflussparameter) AS abflussparameter,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geom, be.geom) AS geom
    FROM sync_tezg AS sy
    JOIN main.tezg AS be ON be.pk = sy.pk_best
    JOIN ext.tezg AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.tezg.pk = mo.pk_best;"

# Tezg auflisten
sync_tezg_prot: "
SELECT * FROM sync_tezg WHERE status;"
