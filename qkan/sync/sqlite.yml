# Flaechen mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_flaechen_dif: "
INSERT INTO sync_flaechen (
    pk_best, pk_ext, flnam, objekt, aktion, status,
    haltnam, schnam, neigkl, neigung, teilgebiet, regenschreiber,
    abflussparameter, aufteilen, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.flnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(be.neigkl <> ex.neigkl, printf('%d -> %d', be.neigkl, ex.neigkl), NULL) AS neigkl,
    iif(coalesce(abs(be.neigung - ex.neigung), 0) > 0.001, printf('%.3f -> %.3f', be.neigung, ex.neigung), NULL) AS neigung,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.regenschreiber <> ex.regenschreiber, printf('%s -> %s', be.regenschreiber, ex.regenschreiber), NULL) AS regenschreiber,
    iif(be.abflussparameter <> ex.abflussparameter, printf('%s -> %s', be.abflussparameter, ex.abflussparameter), NULL) AS abflussparameter,
    iif(be.aufteilen <> ex.aufteilen, printf('%d -> %d', be.aufteilen, ex.aufteilen), NULL) AS aufteilen,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.flaechen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.flaechen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS ex
ON ex.flnam = be.flnam
WHERE
    be.haltnam <> ex.haltnam OR
    be.schnam <> ex.schnam OR
    be.neigkl <> ex.neigkl OR
    coalesce(abs(be.neigung - ex.neigung), 0) > 0.001 OR
    be.teilgebiet <> ex.teilgebiet OR
    be.regenschreiber <> ex.regenschreiber OR
    be.abflussparameter <> ex.abflussparameter OR
    be.aufteilen <> ex.aufteilen OR
    be.kommentar <> ex.kommentar OR
    be.geom <> ex.geom;"

