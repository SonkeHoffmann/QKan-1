    pk_best, pk_ext, elnam, objekt, aktion, status,
    elnam, haltnam, schnam, teilgebiet,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.elnam,
    iif(be.glink <> ex.glink, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.elnam <> ex.elnam, printf('%s -> %s', be.elnam, ex.elnam), NULL) AS elnam,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    be.glink AS glink
FROM (
    SELECT *
    FROM main.linksw AS t
    GROUP BY t.elnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.linksw AS t
    GROUP BY t.elnam
    HAVING count() = 1
) AS ex
ON ex.elnam = be.elnam
WHERE
    be.elnam <> ex.elnam OR
    be.haltnam <> ex.haltnam OR
    be.schnam <> ex.schnam OR
    be.teilgebiet <> ex.teilgebiet OR
    be.glink <> ex.glink;"

# Linksw hinzufügen
sync_linksw_add: "
