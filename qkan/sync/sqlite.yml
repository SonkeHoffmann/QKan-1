sync_schaechte_mod: "
UPDATE main.schaechte
SET
    schnam = mo.schnam,
    sohlhoehe = mo.sohlhoehe,
    deckelhoehe = mo.deckelhoehe,
    durchm = mo.durchm,
    druckdicht = mo.druckdicht,
    ueberstauflaeche = mo.ueberstauflaeche,
    entwart = mo.entwart,
    strasse = mo.strasse,
    baujahr = mo.baujahr,
    eigentum = mo.eigentum,
    teilgebiet = mo.teilgebiet,
    knotentyp = mo.knotentyp,
    auslasstyp = mo.auslasstyp,
    schachttyp = mo.schachttyp,
    simstatus = mo.simstatus,
    material = mo.material,
    xsch = mo.xsch,
    ysch = mo.ysch,
    kommentar = mo.kommentar,
    geop = mo.geop
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.schnam IS NOT NULL AND sy.schnam <> '', ex.schnam, be.schnam) AS schnam,
        iif(sy.sohlhoehe IS NOT NULL, ex.sohlhoehe, be.sohlhoehe) AS sohlhoehe,
        iif(sy.deckelhoehe IS NOT NULL, ex.deckelhoehe, be.deckelhoehe) AS deckelhoehe,
        iif(sy.durchm IS NOT NULL, ex.durchm, be.durchm) AS durchm,
        iif(sy.druckdicht IS NOT NULL, ex.druckdicht, be.druckdicht) AS druckdicht,
        iif(sy.ueberstauflaeche IS NOT NULL, ex.ueberstauflaeche, be.ueberstauflaeche) AS ueberstauflaeche,
        iif(sy.entwart IS NOT NULL AND sy.entwart <> '', ex.entwart, be.entwart) AS entwart,
        iif(sy.strasse IS NOT NULL AND sy.strasse <> '', ex.strasse, be.strasse) AS strasse,
        iif(sy.baujahr IS NOT NULL, ex.baujahr, be.baujahr) AS baujahr,
        iif(sy.eigentum IS NOT NULL AND sy.eigentum <> '', ex.eigentum, be.eigentum) AS eigentum,
        iif(sy.teilgebiet IS NOT NULL AND sy.teilgebiet <> '', ex.teilgebiet, be.teilgebiet) AS teilgebiet,
        iif(sy.knotentyp IS NOT NULL AND sy.knotentyp <> '', ex.knotentyp, be.knotentyp) AS knotentyp,
        iif(sy.auslasstyp IS NOT NULL AND sy.auslasstyp <> '', ex.auslasstyp, be.auslasstyp) AS auslasstyp,
        iif(sy.schachttyp IS NOT NULL AND sy.schachttyp <> '', ex.schachttyp, be.schachttyp) AS schachttyp,
        iif(sy.simstatus IS NOT NULL AND sy.simstatus <> '', ex.simstatus, be.simstatus) AS simstatus,
        iif(sy.material IS NOT NULL AND sy.material <> '', ex.material, be.material) AS material,
        iif(sy.xsch IS NOT NULL, ex.xsch, be.xsch) AS xsch,
        iif(sy.ysch IS NOT NULL, ex.ysch, be.ysch) AS ysch,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geop, be.geop) AS geop
    FROM sync_schaechte AS sy
    JOIN main.schaechte AS be ON be.pk = sy.pk_best
    JOIN ext.schaechte AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.schaechte.pk = mo.pk_best;"

