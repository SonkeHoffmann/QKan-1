sync_attach_ext: "
ATTACH DATABASE ? AS ext"

sync_collect_teilgebiete: "
WITH tgb AS (
    SELECT teilgebiet FROM flaechen
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM tezg
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM haltungen
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM schaechte
    WHERE teilgebiet IS NOT NULL
)
INSERT INTO teilgebiete (tgnam)
SELECT teilgebiet FROM tgb
WHERE teilgebiet NOT IN (SELECT tgnam FROM teilgebiete)
GROUP BY teilgebiet"

sync_list_teilgebiete: "
SELECT tgnam FROM teilgebiete GROUP BY tgnam"


# SQL name pattern for all tables:
#   sync_create_{table},
#   sync_create_{table}_geom,
#   sync_reset_{table},
#   sync_{table}_ext,
#   sync_{table}_local,
#   sync_{table}_dif,
#
#   sync_{table}_add,
#   sync_{table}_del,
#   sync_{table}_mod

sync_create_haltungen: "
CREATE TABLE IF NOT EXISTS sync_haltungen (
    pk INTEGER PRIMARY KEY,
    pk_best INT,
    pk_ext INT,
    aktion TEXT,
    status INT,
    objekt TEXT,
    haltnam TEXT,
    schoben TEXT,
    schunten TEXT,
    hoehe REAL,
    breite REAL,
    laenge REAL,
    aussendurchmesser REAL,
    sohleoben REAL,
    sohleunten REAL,
    baujahr INT,
    eigentum TEXT,
    teilgebiet TEXT,
    strasse TEXT,
    profilnam TEXT,
    entwart TEXT,
    material TEXT,
    profilauskleidung TEXT,
    innenmaterial TEXT,
    ks REAL,
    haltungstyp TEXT,
    simstatus TEXT,
    rwanschluss INTEGER,
    druckdicht INTEGER,
    kommentar TEXT,
    createdat TEXT DEFAULT CURRENT_TIMESTAMP);"

sync_create_haltungen_geom: "
SELECT AddGeometryColumn('sync_haltungen', 'geom', :epsg, 'LINESTRING', 2);"

sync_reset_haltungen: "
DELETE FROM sync_haltungen;"

# Haltungen, die nur in der externen Datenbank vorkommen, Vergleich anhand Haltungsname
sync_haltungen_ext: "
INSERT INTO sync_haltungen (
    pk_best, pk_ext, haltnam, objekt, aktion, status,
    schoben, schunten, hoehe, breite, laenge, aussendurchmesser, sohleoben, sohleunten, 
    baujahr, eigentum, teilgebiet, strasse, profilnam, entwart, material, profilauskleidung, innenmaterial, ks, haltungstyp, 
    simstatus, rwanschluss, druckdicht, kommentar, createdat, geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.haltnam,
    'Datensatz nicht im Bestand' AS objekt, 'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.schoben, ex.schunten, ex.hoehe, ex.breite, ex.laenge, ex.aussendurchmesser, ex.sohleoben, ex.sohleunten,
    ex.baujahr, ex.eigentum, ex.teilgebiet, ex.strasse, ex.profilnam, ex.entwart, ex.material, ex.profilauskleidung,
    ex.innenmaterial, ex.ks, ex.haltungstyp, ex.simstatus, ex.rwanschluss, ex.druckdicht, ex.kommentar, ex.createdat, ex.geom
FROM (
    SELECT * 
    FROM ext.haltungen AS h
    WHERE NOT :seltgb
       OR h.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
   GROUP BY h.haltnam
   HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.haltungen AS h
    WHERE NOT :seltgb
       OR h.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY h.haltnam
    HAVING count() = 1
) AS be
ON be.haltnam = ex.haltnam
WHERE be.pk IS NULL;"

# Haltungen, die nur in der bestehenden Datenbank vorkommen, Vergleich anhand Haltungsname
sync_haltungen_local: "
INSERT INTO sync_haltungen (
    pk_best, pk_ext, haltnam, objekt, aktion, status,
    schoben, schunten, hoehe, breite, laenge, aussendurchmesser, sohleoben, sohleunten, 
    baujahr, eigentum, teilgebiet, strasse, profilnam, entwart, material, profilauskleidung, innenmaterial, ks, haltungstyp, 
    simstatus, rwanschluss, druckdicht, kommentar, createdat, geom)
SELECT
    be.pk AS pk_best, NULL AS pk_ext, be.haltnam,
    'Datensatz extern nicht vorhanden' AS objekt, 'löschen' AS aktion, 0 AS status,      /* löschen */
    be.schoben, be.schunten, be.hoehe, be.breite, be.laenge, be.aussendurchmesser, be.sohleoben, be.sohleunten,
    be.baujahr, be.eigentum, be.teilgebiet, be.strasse, be.profilnam, be.entwart, be.material, be.profilauskleidung,
    be.innenmaterial, be.ks, be.haltungstyp, be.simstatus, be.rwanschluss, be.druckdicht, be.kommentar, be.createdat, be.geom
FROM (
    SELECT *
    FROM main.haltungen AS h
    WHERE NOT :seltgb
       OR h.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY h.haltnam
    HAVING count() = 1
) AS be
