    video_start, video_ende, ZD, ZB, ZS, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.untersuchhal,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.untersuchhal <> ex.untersuchhal, printf('%s -> %s', be.untersuchhal, ex.untersuchhal), NULL) AS untersuchhal,
    iif(be.schoben <> ex.schoben, printf('%s -> %s', be.schoben, ex.schoben), NULL) AS schoben,
    iif(be.schunten <> ex.schunten, printf('%s -> %s', be.schunten, ex.schunten), NULL) AS schunten,
    iif(be.id <> ex.id, printf('%d -> %d', be.id, ex.id), NULL) AS id,
    iif(be.untersuchtag <> ex.untersuchtag, printf('%s -> %s', be.untersuchtag, ex.untersuchtag), NULL) AS untersuchtag,
    iif(be.bandnr <> ex.bandnr, printf('%d -> %d', be.bandnr, ex.bandnr), NULL) AS bandnr,
    iif(be.videozaehler <> ex.videozaehler, printf('%s -> %s', be.videozaehler, ex.videozaehler), NULL) AS videozaehler,
    iif(coalesce(abs(be.inspektionslaenge - ex.inspektionslaenge), 0) > 0.001, printf('%.3f -> %.3f', be.inspektionslaenge, ex.inspektionslaenge), NULL) AS inspektionslaenge,
    iif(coalesce(abs(be.station - ex.station), 0) > 0.001, printf('%.3f -> %.3f', be.station, ex.station), NULL) AS station,
    iif(coalesce(abs(be.stationtext - ex.stationtext), 0) > 0.001, printf('%.3f -> %.3f', be.stationtext, ex.stationtext), NULL) AS stationtext,
    iif(be.timecode <> ex.timecode, printf('%s -> %s', be.timecode, ex.timecode), NULL) AS timecode,
    iif(coalesce(abs(be.video_offset - ex.video_offset), 0) > 0.001, printf('%.3f -> %.3f', be.video_offset, ex.video_offset), NULL) AS video_offset,
    iif(be.langtext <> ex.langtext, printf('%s -> %s', be.langtext, ex.langtext), NULL) AS langtext,
    iif(be.kuerzel <> ex.kuerzel, printf('%s -> %s', be.kuerzel, ex.kuerzel), NULL) AS kuerzel,
    iif(be.charakt1 <> ex.charakt1, printf('%s -> %s', be.charakt1, ex.charakt1), NULL) AS charakt1,
    iif(be.charakt2 <> ex.charakt2, printf('%s -> %s', be.charakt2, ex.charakt2), NULL) AS charakt2,
    iif(coalesce(abs(be.quantnr1 - ex.quantnr1), 0) > 0.001, printf('%.3f -> %.3f', be.quantnr1, ex.quantnr1), NULL) AS quantnr1,
    iif(coalesce(abs(be.quantnr2 - ex.quantnr2), 0) > 0.001, printf('%.3f -> %.3f', be.quantnr2, ex.quantnr2), NULL) AS quantnr2,
    iif(be.streckenschaden <> ex.streckenschaden, printf('%s -> %s', be.streckenschaden, ex.streckenschaden), NULL) AS streckenschaden,
    iif(be.streckenschaden_lfdnr <> ex.streckenschaden_lfdnr, printf('%d -> %d', be.streckenschaden_lfdnr, ex.streckenschaden_lfdnr), NULL) AS streckenschaden_lfdnr,
    iif(be.pos_von <> ex.pos_von, printf('%d -> %d', be.pos_von, ex.pos_von), NULL) AS pos_von,
    iif(be.pos_bis <> ex.pos_bis, printf('%d -> %d', be.pos_bis, ex.pos_bis), NULL) AS pos_bis,
    iif(be.foto_dateiname <> ex.foto_dateiname, printf('%s -> %s', be.foto_dateiname, ex.foto_dateiname), NULL) AS foto_dateiname,
    iif(be.film_dateiname <> ex.film_dateiname, printf('%s -> %s', be.film_dateiname, ex.film_dateiname), NULL) AS film_dateiname,
    iif(be.ordner_bild <> ex.ordner_bild, printf('%s -> %s', be.ordner_bild, ex.ordner_bild), NULL) AS ordner_bild,
    iif(be.ordner_video <> ex.ordner_video, printf('%s -> %s', be.ordner_video, ex.ordner_video), NULL) AS ordner_video,
    iif(be.filmtyp <> ex.filmtyp, printf('%d -> %d', be.filmtyp, ex.filmtyp), NULL) AS filmtyp,
    iif(be.video_start <> ex.video_start, printf('%d -> %d', be.video_start, ex.video_start), NULL) AS video_start,
    iif(be.video_ende <> ex.video_ende, printf('%d -> %d', be.video_ende, ex.video_ende), NULL) AS video_ende,
    iif(be.ZD <> ex.ZD, printf('%d -> %d', be.ZD, ex.ZD), NULL) AS ZD,
    iif(be.ZB <> ex.ZB, printf('%d -> %d', be.ZB, ex.ZB), NULL) AS ZB,
    iif(be.ZS <> ex.ZS, printf('%d -> %d', be.ZS, ex.ZS), NULL) AS ZS,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.untersuchdat_haltung AS t
    GROUP BY t.untersuchhal
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.untersuchdat_haltung AS t
    GROUP BY t.untersuchhal
    HAVING count() = 1
) AS ex
ON ex.untersuchhal = be.untersuchhal
WHERE
    be.untersuchhal <> ex.untersuchhal OR
    be.schoben <> ex.schoben OR
    be.schunten <> ex.schunten OR
    be.id <> ex.id OR
    be.untersuchtag <> ex.untersuchtag OR
    be.bandnr <> ex.bandnr OR
    be.videozaehler <> ex.videozaehler OR
    coalesce(abs(be.inspektionslaenge - ex.inspektionslaenge), 0) > 0.001 OR
    coalesce(abs(be.station - ex.station), 0) > 0.001 OR
    coalesce(abs(be.stationtext - ex.stationtext), 0) > 0.001 OR
    be.timecode <> ex.timecode OR
    coalesce(abs(be.video_offset - ex.video_offset), 0) > 0.001 OR
    be.langtext <> ex.langtext OR
    be.kuerzel <> ex.kuerzel OR
    be.charakt1 <> ex.charakt1 OR
    be.charakt2 <> ex.charakt2 OR
    coalesce(abs(be.quantnr1 - ex.quantnr1), 0) > 0.001 OR
    coalesce(abs(be.quantnr2 - ex.quantnr2), 0) > 0.001 OR
    be.streckenschaden <> ex.streckenschaden OR
    be.streckenschaden_lfdnr <> ex.streckenschaden_lfdnr OR
    be.pos_von <> ex.pos_von OR
    be.pos_bis <> ex.pos_bis OR
    be.foto_dateiname <> ex.foto_dateiname OR
    be.film_dateiname <> ex.film_dateiname OR
    be.ordner_bild <> ex.ordner_bild OR
    be.ordner_video <> ex.ordner_video OR
    be.filmtyp <> ex.filmtyp OR
    be.video_start <> ex.video_start OR
    be.video_ende <> ex.video_ende OR
    be.ZD <> ex.ZD OR
    be.ZB <> ex.ZB OR
    be.ZS <> ex.ZS OR
    be.kommentar <> ex.kommentar OR
    be.geom <> ex.geom;"

