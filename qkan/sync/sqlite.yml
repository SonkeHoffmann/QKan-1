        iif(sy.schnam IS NOT NULL AND sy.schnam <> '', ex.schnam, be.schnam) AS schnam,
        iif(sy.tezgnam IS NOT NULL AND sy.tezgnam <> '', ex.tezgnam, be.tezgnam) AS tezgnam,
