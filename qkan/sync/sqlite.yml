# Schaechte_Untersucht, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_schaechte_untersucht_ext: "
INSERT INTO sync_schaechte_untersucht (
    pk_best, pk_ext, schnam, objekt, aktion, status,
    schnam, durchm, baujahr, bezugspunkt, id, untersuchtag, untersucher,
    wetter, strasse, bewertungsart, bewertungstag, datenart,
    auftragsbezeichnung, max_ZD, max_ZB, max_ZS, kommentar,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.schnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */ 
    ex.schnam, ex.durchm, ex.baujahr, ex.bezugspunkt, ex.id, ex.untersuchtag,
    ex.untersucher, ex.wetter, ex.strasse, ex.bewertungsart,
    ex.bewertungstag, ex.datenart, ex.auftragsbezeichnung, ex.max_ZD,
    ex.max_ZB, ex.max_ZS, ex.kommentar,
    ex.geop AS geop
FROM (
    SELECT * 
    FROM ext.schaechte_untersucht AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.schaechte_untersucht AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
ON be.schnam = ex.schnam
WHERE be.pk IS NULL;"

