    teilgebiet TEXT,
    strasse TEXT,
    profilnam TEXT,
    entwart TEXT,
    material TEXT,
    profilauskleidung TEXT,
    innenmaterial TEXT,
    ks REAL,
    simstatus TEXT,
    xschob REAL,
