# Aussengebiete mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_aussengebiete_dif: "
INSERT INTO sync_aussengebiete (
    pk_best, pk_ext, gebnam, objekt, aktion, status,
    gebnam, schnam, hoeheob, hoeheun, fliessweg, basisabfluss, cn,
    regenschreiber, teilgebiet, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.gebnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.gebnam <> ex.gebnam, printf('%s -> %s', be.gebnam, ex.gebnam), NULL) AS gebnam,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(coalesce(abs(be.hoeheob - ex.hoeheob), 0) > 0.001, printf('%.3f -> %.3f', be.hoeheob, ex.hoeheob), NULL) AS hoeheob,
    iif(coalesce(abs(be.hoeheun - ex.hoeheun), 0) > 0.001, printf('%.3f -> %.3f', be.hoeheun, ex.hoeheun), NULL) AS hoeheun,
    iif(coalesce(abs(be.fliessweg - ex.fliessweg), 0) > 0.001, printf('%.3f -> %.3f', be.fliessweg, ex.fliessweg), NULL) AS fliessweg,
    iif(coalesce(abs(be.basisabfluss - ex.basisabfluss), 0) > 0.001, printf('%.3f -> %.3f', be.basisabfluss, ex.basisabfluss), NULL) AS basisabfluss,
    iif(coalesce(abs(be.cn - ex.cn), 0) > 0.001, printf('%.3f -> %.3f', be.cn, ex.cn), NULL) AS cn,
    iif(be.regenschreiber <> ex.regenschreiber, printf('%s -> %s', be.regenschreiber, ex.regenschreiber), NULL) AS regenschreiber,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.aussengebiete AS t
    GROUP BY t.gebnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.aussengebiete AS t
    GROUP BY t.gebnam
    HAVING count() = 1
) AS ex
ON ex.gebnam = be.gebnam
WHERE
    be.gebnam <> ex.gebnam OR
    be.schnam <> ex.schnam OR
    coalesce(abs(be.hoeheob - ex.hoeheob), 0) > 0.001 OR
    coalesce(abs(be.hoeheun - ex.hoeheun), 0) > 0.001 OR
    coalesce(abs(be.fliessweg - ex.fliessweg), 0) > 0.001 OR
    coalesce(abs(be.basisabfluss - ex.basisabfluss), 0) > 0.001 OR
    coalesce(abs(be.cn - ex.cn), 0) > 0.001 OR
    be.regenschreiber <> ex.regenschreiber OR
    be.teilgebiet <> ex.teilgebiet OR
    be.kommentar <> ex.kommentar OR
    be.geom <> ex.geom;"

