    max_ZS, xschob, yschob, xschun, yschun, kommentar,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.leitnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.bezugspunkt, ex.schoben, ex.schunten, ex.hoehe, ex.breite, ex.laenge,
    ex.baujahr, ex.id, ex.untersuchtag, ex.untersucher,
    ex.untersuchrichtung, ex.wetter, ex.bewertungsart, ex.bewertungstag,
    ex.strasse, ex.datenart, ex.auftragsbezeichnung, ex.max_ZD, ex.max_ZB,
    ex.max_ZS, ex.xschob, ex.yschob, ex.xschun, ex.yschun, ex.kommentar,
    ex.geom AS geom
FROM (
    SELECT * 
