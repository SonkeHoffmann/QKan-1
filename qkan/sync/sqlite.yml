# Flaechen, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_flaechen_ext: "
INSERT INTO sync_flaechen (
    pk_best, pk_ext, flnam, objekt, aktion, status,
    haltnam, schnam, neigkl, neigung, teilgebiet, regenschreiber,
    abflussparameter, aufteilen, kommentar,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.flnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.haltnam, ex.schnam, ex.neigkl, ex.neigung, ex.teilgebiet,
    ex.regenschreiber, ex.abflussparameter, ex.aufteilen, ex.kommentar,
    ex.geom AS geom
FROM (
    SELECT * 
    FROM ext.flaechen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.flaechen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS be
ON be.flnam = ex.flnam
WHERE be.pk IS NULL;"

