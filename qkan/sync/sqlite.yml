        iif(sy.abflusstyp IS NOT NULL AND sy.abflusstyp <> '', ex.abflusstyp, be.abflusstyp) AS abflusstyp,
        iif(sy.speicherzahl IS NOT NULL, ex.speicherzahl, be.speicherzahl) AS speicherzahl,
        iif(sy.speicherkonst IS NOT NULL, ex.speicherkonst, be.speicherkonst) AS speicherkonst,
        iif(sy.fliesszeitkanal IS NOT NULL, ex.fliesszeitkanal, be.fliesszeitkanal) AS fliesszeitkanal,
        iif(sy.fliesszeitflaeche IS NOT NULL, ex.fliesszeitflaeche, be.fliesszeitflaeche) AS fliesszeitflaeche,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.glink, be.glink) AS glink
