    video_start = mo.video_start,
    video_ende = mo.video_ende,
    ZD = mo.ZD,
    ZB = mo.ZB,
    ZS = mo.ZS,
    kommentar = mo.kommentar,
    geom = mo.geom
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.untersuchhal IS NOT NULL AND sy.untersuchhal <> '', ex.untersuchhal, be.untersuchhal) AS untersuchhal,
        iif(sy.schoben IS NOT NULL AND sy.schoben <> '', ex.schoben, be.schoben) AS schoben,
        iif(sy.schunten IS NOT NULL AND sy.schunten <> '', ex.schunten, be.schunten) AS schunten,
        iif(sy.id IS NOT NULL, ex.id, be.id) AS id,
        iif(sy.untersuchtag IS NOT NULL AND sy.untersuchtag <> '', ex.untersuchtag, be.untersuchtag) AS untersuchtag,
        iif(sy.bandnr IS NOT NULL, ex.bandnr, be.bandnr) AS bandnr,
        iif(sy.videozaehler IS NOT NULL AND sy.videozaehler <> '', ex.videozaehler, be.videozaehler) AS videozaehler,
        iif(sy.inspektionslaenge IS NOT NULL, ex.inspektionslaenge, be.inspektionslaenge) AS inspektionslaenge,
        iif(sy.station IS NOT NULL, ex.station, be.station) AS station,
        iif(sy.stationtext IS NOT NULL, ex.stationtext, be.stationtext) AS stationtext,
        iif(sy.timecode IS NOT NULL AND sy.timecode <> '', ex.timecode, be.timecode) AS timecode,
        iif(sy.video_offset IS NOT NULL, ex.video_offset, be.video_offset) AS video_offset,
        iif(sy.langtext IS NOT NULL AND sy.langtext <> '', ex.langtext, be.langtext) AS langtext,
        iif(sy.kuerzel IS NOT NULL AND sy.kuerzel <> '', ex.kuerzel, be.kuerzel) AS kuerzel,
        iif(sy.charakt1 IS NOT NULL AND sy.charakt1 <> '', ex.charakt1, be.charakt1) AS charakt1,
        iif(sy.charakt2 IS NOT NULL AND sy.charakt2 <> '', ex.charakt2, be.charakt2) AS charakt2,
        iif(sy.quantnr1 IS NOT NULL, ex.quantnr1, be.quantnr1) AS quantnr1,
        iif(sy.quantnr2 IS NOT NULL, ex.quantnr2, be.quantnr2) AS quantnr2,
        iif(sy.streckenschaden IS NOT NULL AND sy.streckenschaden <> '', ex.streckenschaden, be.streckenschaden) AS streckenschaden,
        iif(sy.streckenschaden_lfdnr IS NOT NULL, ex.streckenschaden_lfdnr, be.streckenschaden_lfdnr) AS streckenschaden_lfdnr,
        iif(sy.pos_von IS NOT NULL, ex.pos_von, be.pos_von) AS pos_von,
        iif(sy.pos_bis IS NOT NULL, ex.pos_bis, be.pos_bis) AS pos_bis,
        iif(sy.foto_dateiname IS NOT NULL AND sy.foto_dateiname <> '', ex.foto_dateiname, be.foto_dateiname) AS foto_dateiname,
        iif(sy.film_dateiname IS NOT NULL AND sy.film_dateiname <> '', ex.film_dateiname, be.film_dateiname) AS film_dateiname,
        iif(sy.ordner_bild IS NOT NULL AND sy.ordner_bild <> '', ex.ordner_bild, be.ordner_bild) AS ordner_bild,
        iif(sy.ordner_video IS NOT NULL AND sy.ordner_video <> '', ex.ordner_video, be.ordner_video) AS ordner_video,
        iif(sy.filmtyp IS NOT NULL, ex.filmtyp, be.filmtyp) AS filmtyp,
        iif(sy.video_start IS NOT NULL, ex.video_start, be.video_start) AS video_start,
        iif(sy.video_ende IS NOT NULL, ex.video_ende, be.video_ende) AS video_ende,
        iif(sy.ZD IS NOT NULL, ex.ZD, be.ZD) AS ZD,
        iif(sy.ZB IS NOT NULL, ex.ZB, be.ZB) AS ZB,
        iif(sy.ZS IS NOT NULL, ex.ZS, be.ZS) AS ZS,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geom, be.geom) AS geom
    FROM sync_untersuchdat_haltung AS sy
    JOIN main.untersuchdat_haltung AS be ON be.pk = sy.pk_best
    JOIN ext.untersuchdat_haltung AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.untersuchdat_haltung.pk = mo.pk_best;"

