    GROUP BY t.leitnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.anschlussleitungen_untersucht AS t
    GROUP BY t.leitnam
    HAVING count() = 1
) AS be
ON be.leitnam = ex.leitnam
