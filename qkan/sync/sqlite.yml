# Anschlussleitungen mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_anschlussleitungen_dif: "
INSERT INTO sync_anschlussleitungen (
    pk_best, pk_ext, leitnam, objekt, aktion, status,
    schoben, schunten, hoehe, breite, laenge, aussendurchmesser, sohleoben, sohleunten, 
    baujahr, haltnam, teilgebiet, strasse, profilnam, entwart, material, profilauskleidung, innenmaterial, ks, anschlusstyp, 
    simstatus, kommentar, createdat, geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.leitnam,
    iif(ex.geom <> be.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(coalesce(abs(be.schoben - ex.schoben), 0) > 0.001, printf('%s -> %s', be.schoben, ex.schoben), NULL) AS schoben,
    iif(coalesce(abs(be.schunten - ex.schunten), 0) > 0.001, printf('%s -> %s', be.schunten, ex.schunten), NULL) AS schunten,
    iif(coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001, printf('%.2f -> %.2f', ex.hoehe, be.hoehe), NULL) AS hoehe,
    iif(coalesce(abs(be.breite - ex.breite), 0) > 0.001, printf('%.0f -> %.0f', ex.breite, be.breite), NULL) AS breite,
    iif(coalesce(abs(be.laenge - ex.laenge), 0) > 0.001, printf('%.2f -> %.2f', ex.laenge, be.laenge), NULL) AS laenge,
    iif(coalesce(abs(be.aussendurchmesser - ex.aussendurchmesser), 0) > 0.001, printf('%.0f -> %.0f', ex.aussendurchmesser, be.aussendurchmesser), NULL) AS aussendurchmesser,
    iif(coalesce(abs(be.sohleoben - ex.sohleoben), 0) > 0.001, printf('%.2f -> %.2f', ex.sohleoben, be.sohleoben), NULL) AS sohleoben,
    iif(coalesce(abs(be.sohleunten - ex.sohleunten), 0) > 0.001, printf('%.2f -> %.2f', ex.sohleunten, be.sohleunten), NULL) AS sohleunten,
    iif(coalesce(abs(be.baujahr - ex.baujahr), 0) > 0.001, printf('%.d -> %.d', ex.baujahr, be.baujahr), NULL) AS baujahr,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.profilnam <> ex.profilnam, printf('%s -> %s', be.profilnam, ex.profilnam), NULL) AS profilnam,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.material <> ex.material, printf('%s -> %s', be.material, ex.material), NULL) AS material,
    iif(be.profilauskleidung <> ex.profilauskleidung, printf('%s -> %s', be.profilauskleidung, ex.profilauskleidung), NULL) AS profilauskleidung,
    iif(be.innenmaterial <> ex.innenmaterial, printf('%s -> %s', be.innenmaterial, ex.innenmaterial), NULL) AS innenmaterial,
    iif(be.ks <> ex.ks, printf('%.4f -> %.4f', ex.ks, be.ks), NULL) AS ks,
    iif(be.anschlusstyp <> ex.anschlusstyp, printf('%s -> %s', be.anschlusstyp, ex.anschlusstyp), NULL) AS anschlusstyp,
    iif(be.simstatus <> ex.simstatus, printf('%s -> %s', be.simstatus, ex.simstatus), NULL) AS simstatus,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    iif(abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5, printf('%s -> %s', ex.createdat, be.createdat), NULL) AS createdat,
    be.geom AS geom
FROM (
    SELECT * 
    FROM main.anschlussleitungen AS a
    WHERE NOT :seltgb
       OR a.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
   GROUP BY a.leitnam
   HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.anschlussleitungen AS a
    WHERE NOT :seltgb
       OR a.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
   GROUP BY a.leitnam
   HAVING count() = 1
) AS ex ON ex.leitnam = be.leitnam
WHERE
    coalesce(abs(be.schoben - ex.schoben), 0) > 0.001 OR
    coalesce(abs(be.schunten - ex.schunten), 0) > 0.001 OR
    coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001 OR
    coalesce(abs(be.breite - ex.breite), 0) > 0.001 OR
    coalesce(abs(be.laenge - ex.laenge), 0) > 0.001 OR
    coalesce(abs(be.aussendurchmesser - ex.aussendurchmesser), 0) > 0.001 OR
    coalesce(abs(be.sohleoben - ex.sohleoben), 0) > 0.001 OR
    coalesce(abs(be.sohleunten - ex.sohleunten), 0) > 0.001 OR
    coalesce(abs(be.baujahr - ex.baujahr), 0) > 0.001 OR
    be.haltnam <> ex.haltnam OR
    be.teilgebiet <> ex.teilgebiet OR
    be.strasse <> ex.strasse OR
    be.profilnam <> ex.profilnam OR
    be.entwart <> ex.entwart OR
    be.material <> ex.material OR
    be.profilauskleidung <> ex.profilauskleidung OR
    be.innenmaterial <> ex.innenmaterial OR
    be.ks <> ex.ks OR
    be.anschlusstyp <> ex.anschlusstyp OR
    be.simstatus <> ex.simstatus OR
    be.kommentar <> ex.kommentar OR
    abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5 OR
    be.geom <> ex.geom;"

