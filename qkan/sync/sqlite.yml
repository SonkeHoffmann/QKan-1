# Schaechte_Untersucht mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_schaechte_untersucht_dif: "
INSERT INTO sync_schaechte_untersucht (
    pk_best, pk_ext, schnam, objekt, aktion, status,
    schnam, durchm, baujahr, bezugspunkt, id, untersuchtag, untersucher,
    wetter, strasse, bewertungsart, bewertungstag, datenart,
    auftragsbezeichnung, max_ZD, max_ZB, max_ZS, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.schnam,
    iif(be.geop <> ex.geop, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(coalesce(abs(be.durchm - ex.durchm), 0) > 0.001, printf('%.3f -> %.3f', be.durchm, ex.durchm), NULL) AS durchm,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.bezugspunkt <> ex.bezugspunkt, printf('%s -> %s', be.bezugspunkt, ex.bezugspunkt), NULL) AS bezugspunkt,
    iif(be.id <> ex.id, printf('%d -> %d', be.id, ex.id), NULL) AS id,
    iif(be.untersuchtag <> ex.untersuchtag, printf('%s -> %s', be.untersuchtag, ex.untersuchtag), NULL) AS untersuchtag,
    iif(be.untersucher <> ex.untersucher, printf('%s -> %s', be.untersucher, ex.untersucher), NULL) AS untersucher,
    iif(be.wetter <> ex.wetter, printf('%d -> %d', be.wetter, ex.wetter), NULL) AS wetter,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.bewertungsart <> ex.bewertungsart, printf('%s -> %s', be.bewertungsart, ex.bewertungsart), NULL) AS bewertungsart,
    iif(be.bewertungstag <> ex.bewertungstag, printf('%s -> %s', be.bewertungstag, ex.bewertungstag), NULL) AS bewertungstag,
    iif(be.datenart <> ex.datenart, printf('%s -> %s', be.datenart, ex.datenart), NULL) AS datenart,
    iif(be.auftragsbezeichnung <> ex.auftragsbezeichnung, printf('%s -> %s', be.auftragsbezeichnung, ex.auftragsbezeichnung), NULL) AS auftragsbezeichnung,
    iif(be.max_ZD <> ex.max_ZD, printf('%d -> %d', be.max_ZD, ex.max_ZD), NULL) AS max_ZD,
    iif(be.max_ZB <> ex.max_ZB, printf('%d -> %d', be.max_ZB, ex.max_ZB), NULL) AS max_ZB,
    iif(be.max_ZS <> ex.max_ZS, printf('%d -> %d', be.max_ZS, ex.max_ZS), NULL) AS max_ZS,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geop AS geop
FROM (
    SELECT *
    FROM main.schaechte_untersucht AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.schaechte_untersucht AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
ON ex.schnam = be.schnam
WHERE
    be.schnam <> ex.schnam OR
    coalesce(abs(be.durchm - ex.durchm), 0) > 0.001 OR
    be.baujahr <> ex.baujahr OR
    be.bezugspunkt <> ex.bezugspunkt OR
    be.id <> ex.id OR
    be.untersuchtag <> ex.untersuchtag OR
    be.untersucher <> ex.untersucher OR
    be.wetter <> ex.wetter OR
    be.strasse <> ex.strasse OR
    be.bewertungsart <> ex.bewertungsart OR
    be.bewertungstag <> ex.bewertungstag OR
    be.datenart <> ex.datenart OR
    be.auftragsbezeichnung <> ex.auftragsbezeichnung OR
    be.max_ZD <> ex.max_ZD OR
    be.max_ZB <> ex.max_ZB OR
    be.max_ZS <> ex.max_ZS OR
    be.kommentar <> ex.kommentar OR
    be.geop <> ex.geop;"

