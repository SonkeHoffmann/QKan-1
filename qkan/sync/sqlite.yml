    schnam, sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche,
    entwart, strasse, baujahr, eigentum, teilgebiet, knotentyp,
    auslasstyp, schachttyp, simstatus, material, xsch, ysch, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.schnam,
    iif(be.geop <> ex.geop, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.sohlhoehe, ex.sohlhoehe), NULL) AS sohlhoehe,
    iif(coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.deckelhoehe, ex.deckelhoehe), NULL) AS deckelhoehe,
    iif(coalesce(abs(be.durchm - ex.durchm), 0) > 0.001, printf('%.3f -> %.3f', be.durchm, ex.durchm), NULL) AS durchm,
    iif(be.druckdicht <> ex.druckdicht, printf('%d -> %d', be.druckdicht, ex.druckdicht), NULL) AS druckdicht,
    iif(coalesce(abs(be.ueberstauflaeche - ex.ueberstauflaeche), 0) > 0.001, printf('%.3f -> %.3f', be.ueberstauflaeche, ex.ueberstauflaeche), NULL) AS ueberstauflaeche,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.eigentum <> ex.eigentum, printf('%s -> %s', be.eigentum, ex.eigentum), NULL) AS eigentum,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.knotentyp <> ex.knotentyp, printf('%s -> %s', be.knotentyp, ex.knotentyp), NULL) AS knotentyp,
    iif(be.auslasstyp <> ex.auslasstyp, printf('%s -> %s', be.auslasstyp, ex.auslasstyp), NULL) AS auslasstyp,
    iif(be.schachttyp <> ex.schachttyp, printf('%s -> %s', be.schachttyp, ex.schachttyp), NULL) AS schachttyp,
    iif(be.simstatus <> ex.simstatus, printf('%s -> %s', be.simstatus, ex.simstatus), NULL) AS simstatus,
    iif(be.material <> ex.material, printf('%s -> %s', be.material, ex.material), NULL) AS material,
    iif(coalesce(abs(be.xsch - ex.xsch), 0) > 0.001, printf('%.3f -> %.3f', be.xsch, ex.xsch), NULL) AS xsch,
    iif(coalesce(abs(be.ysch - ex.ysch), 0) > 0.001, printf('%.3f -> %.3f', be.ysch, ex.ysch), NULL) AS ysch,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geop AS geop
FROM (
    SELECT *
    FROM main.schaechte AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.schaechte AS t
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
ON ex.schnam = be.schnam
WHERE
    be.schnam <> ex.schnam OR
    coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001 OR
    coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001 OR
    coalesce(abs(be.durchm - ex.durchm), 0) > 0.001 OR
    be.druckdicht <> ex.druckdicht OR
    coalesce(abs(be.ueberstauflaeche - ex.ueberstauflaeche), 0) > 0.001 OR
    be.entwart <> ex.entwart OR
    be.strasse <> ex.strasse OR
    be.baujahr <> ex.baujahr OR
    be.eigentum <> ex.eigentum OR
    be.teilgebiet <> ex.teilgebiet OR
    be.knotentyp <> ex.knotentyp OR
    be.auslasstyp <> ex.auslasstyp OR
    be.schachttyp <> ex.schachttyp OR
    be.simstatus <> ex.simstatus OR
    be.material <> ex.material OR
    coalesce(abs(be.xsch - ex.xsch), 0) > 0.001 OR
    coalesce(abs(be.ysch - ex.ysch), 0) > 0.001 OR
    be.kommentar <> ex.kommentar OR
    be.geop <> ex.geop;"

# Schaechte hinzufügen
sync_schaechte_add: "
INSERT INTO main.schaechte (
    schnam, schnam, sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche,
    entwart, strasse, baujahr, eigentum, teilgebiet, knotentyp,
    auslasstyp, schachttyp, simstatus, material, xsch, ysch, kommentar,
    geop)
SELECT
    ex.schnam, ex.schnam, ex.sohlhoehe, ex.deckelhoehe, ex.durchm, ex.druckdicht,
    ex.ueberstauflaeche, ex.entwart, ex.strasse, ex.baujahr, ex.eigentum,
    ex.teilgebiet, ex.knotentyp, ex.auslasstyp, ex.schachttyp,
    ex.simstatus, ex.material, ex.xsch, ex.ysch, ex.kommentar,
    ex.geop AS geop
FROM ext.schaechte AS ex
JOIN sync_schaechte AS sy ON ex.pk = sy.pk_ext
WHERE sy.aktion = 'hinzufügen' 
  AND sy.status;"

# Schaechte löschen
sync_schaechte_del: "
DELETE FROM main.schaechte
WHERE pk IN (
    SELECT pk_best
    FROM sync_schaechte
    WHERE aktion = 'löschen'
      AND status
);"

