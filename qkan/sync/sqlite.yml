# Anschlussleitungen_Untersucht, die nur in der bestehenden Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_anschlussleitungen_untersucht_local: "
INSERT INTO sync_anschlussleitungen_untersucht (
    pk_best, pk_ext, leitnam, objekt, aktion, status,
    leitnam, bezugspunkt, schoben, schunten, hoehe, breite, laenge,
    baujahr, id, untersuchtag, untersucher, untersuchrichtung, wetter,
    bewertungsart, bewertungstag, strasse, datenart, auftragsbezeichnung,
    max_ZD, max_ZB, max_ZS, xschob, yschob, xschun, yschun, kommentar,
    geom)
SELECT
    be.pk AS pk_best, NULL AS pk_ext, be.leitnam,
    'Datensatz extern nicht vorhanden' AS objekt,
    'löschen' AS aktion, 0 AS status,      /* löschen */
    be.leitnam, be.bezugspunkt, be.schoben, be.schunten, be.hoehe, be.breite,
