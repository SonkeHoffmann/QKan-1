# Anschlussleitungen mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_anschlussleitungen_dif: "
INSERT INTO sync_anschlussleitungen (
    pk_best, pk_ext, leitnam, objekt, aktion, status,
    leitnam, schoben, schunten, hoehe, breite, laenge, aussendurchmesser,
    sohleoben, sohleunten, baujahr, haltnam, urstation, ursprung,
    anschlusstyp, lageanschluss, teilgebiet, strasse, profilnam, entwart,
    material, profilauskleidung, innenmaterial, ks, simstatus, xschob,
    yschob, xschun, yschun, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.leitnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.leitnam <> ex.leitnam, printf('%s -> %s', be.leitnam, ex.leitnam), NULL) AS leitnam,
    iif(be.schoben <> ex.schoben, printf('%s -> %s', be.schoben, ex.schoben), NULL) AS schoben,
    iif(be.schunten <> ex.schunten, printf('%s -> %s', be.schunten, ex.schunten), NULL) AS schunten,
    iif(coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001, printf('%.3f -> %.3f', be.hoehe, ex.hoehe), NULL) AS hoehe,
    iif(coalesce(abs(be.breite - ex.breite), 0) > 0.001, printf('%.3f -> %.3f', be.breite, ex.breite), NULL) AS breite,
    iif(coalesce(abs(be.laenge - ex.laenge), 0) > 0.001, printf('%.3f -> %.3f', be.laenge, ex.laenge), NULL) AS laenge,
    iif(coalesce(abs(be.aussendurchmesser - ex.aussendurchmesser), 0) > 0.001, printf('%.3f -> %.3f', be.aussendurchmesser, ex.aussendurchmesser), NULL) AS aussendurchmesser,
    iif(coalesce(abs(be.sohleoben - ex.sohleoben), 0) > 0.001, printf('%.3f -> %.3f', be.sohleoben, ex.sohleoben), NULL) AS sohleoben,
    iif(coalesce(abs(be.sohleunten - ex.sohleunten), 0) > 0.001, printf('%.3f -> %.3f', be.sohleunten, ex.sohleunten), NULL) AS sohleunten,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(coalesce(abs(be.urstation - ex.urstation), 0) > 0.001, printf('%.3f -> %.3f', be.urstation, ex.urstation), NULL) AS urstation,
    iif(be.ursprung <> ex.ursprung, printf('%s -> %s', be.ursprung, ex.ursprung), NULL) AS ursprung,
    iif(be.anschlusstyp <> ex.anschlusstyp, printf('%s -> %s', be.anschlusstyp, ex.anschlusstyp), NULL) AS anschlusstyp,
    iif(be.lageanschluss <> ex.lageanschluss, printf('%d -> %d', be.lageanschluss, ex.lageanschluss), NULL) AS lageanschluss,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.profilnam <> ex.profilnam, printf('%s -> %s', be.profilnam, ex.profilnam), NULL) AS profilnam,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.material <> ex.material, printf('%s -> %s', be.material, ex.material), NULL) AS material,
    iif(be.profilauskleidung <> ex.profilauskleidung, printf('%s -> %s', be.profilauskleidung, ex.profilauskleidung), NULL) AS profilauskleidung,
    iif(be.innenmaterial <> ex.innenmaterial, printf('%s -> %s', be.innenmaterial, ex.innenmaterial), NULL) AS innenmaterial,
    iif(coalesce(abs(be.ks - ex.ks), 0) > 0.001, printf('%.3f -> %.3f', be.ks, ex.ks), NULL) AS ks,
    iif(be.simstatus <> ex.simstatus, printf('%s -> %s', be.simstatus, ex.simstatus), NULL) AS simstatus,
    iif(coalesce(abs(be.xschob - ex.xschob), 0) > 0.001, printf('%.3f -> %.3f', be.xschob, ex.xschob), NULL) AS xschob,
    iif(coalesce(abs(be.yschob - ex.yschob), 0) > 0.001, printf('%.3f -> %.3f', be.yschob, ex.yschob), NULL) AS yschob,
    iif(coalesce(abs(be.xschun - ex.xschun), 0) > 0.001, printf('%.3f -> %.3f', be.xschun, ex.xschun), NULL) AS xschun,
    iif(coalesce(abs(be.yschun - ex.yschun), 0) > 0.001, printf('%.3f -> %.3f', be.yschun, ex.yschun), NULL) AS yschun,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.anschlussleitungen AS t
    GROUP BY t.leitnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.anschlussleitungen AS t
    GROUP BY t.leitnam
    HAVING count() = 1
) AS ex
ON ex.leitnam = be.leitnam
WHERE
    be.leitnam <> ex.leitnam OR
    be.schoben <> ex.schoben OR
    be.schunten <> ex.schunten OR
    coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001 OR
    coalesce(abs(be.breite - ex.breite), 0) > 0.001 OR
    coalesce(abs(be.laenge - ex.laenge), 0) > 0.001 OR
    coalesce(abs(be.aussendurchmesser - ex.aussendurchmesser), 0) > 0.001 OR
    coalesce(abs(be.sohleoben - ex.sohleoben), 0) > 0.001 OR
    coalesce(abs(be.sohleunten - ex.sohleunten), 0) > 0.001 OR
    be.baujahr <> ex.baujahr OR
    be.haltnam <> ex.haltnam OR
    coalesce(abs(be.urstation - ex.urstation), 0) > 0.001 OR
    be.ursprung <> ex.ursprung OR
    be.anschlusstyp <> ex.anschlusstyp OR
    be.lageanschluss <> ex.lageanschluss OR
    be.teilgebiet <> ex.teilgebiet OR
    be.strasse <> ex.strasse OR
    be.profilnam <> ex.profilnam OR
    be.entwart <> ex.entwart OR
    be.material <> ex.material OR
    be.profilauskleidung <> ex.profilauskleidung OR
    be.innenmaterial <> ex.innenmaterial OR
    coalesce(abs(be.ks - ex.ks), 0) > 0.001 OR
    be.simstatus <> ex.simstatus OR
    coalesce(abs(be.xschob - ex.xschob), 0) > 0.001 OR
    coalesce(abs(be.yschob - ex.yschob), 0) > 0.001 OR
    coalesce(abs(be.xschun - ex.xschun), 0) > 0.001 OR
    coalesce(abs(be.yschun - ex.yschun), 0) > 0.001 OR
    be.kommentar <> ex.kommentar OR
    be.geom <> ex.geom;"

# Anschlussleitungen hinzufügen
sync_anschlussleitungen_add: "
INSERT INTO main.anschlussleitungen (
    leitnam, leitnam, schoben, schunten, hoehe, breite, laenge, aussendurchmesser,
    sohleoben, sohleunten, baujahr, haltnam, urstation, ursprung,
    anschlusstyp, lageanschluss, teilgebiet, strasse, profilnam, entwart,
    material, profilauskleidung, innenmaterial, ks, simstatus, xschob,
    yschob, xschun, yschun, kommentar,
    geom)
SELECT
    ex.leitnam, ex.leitnam, ex.schoben, ex.schunten, ex.hoehe, ex.breite, ex.laenge,
    ex.aussendurchmesser, ex.sohleoben, ex.sohleunten, ex.baujahr,
    ex.haltnam, ex.urstation, ex.ursprung, ex.anschlusstyp,
    ex.lageanschluss, ex.teilgebiet, ex.strasse, ex.profilnam, ex.entwart,
    ex.material, ex.profilauskleidung, ex.innenmaterial, ex.ks,
    ex.simstatus, ex.xschob, ex.yschob, ex.xschun, ex.yschun, ex.kommentar,
    ex.geom AS geom
FROM ext.anschlussleitungen AS ex
JOIN sync_anschlussleitungen AS sy ON ex.pk = sy.pk_ext
WHERE sy.aktion = 'hinzufügen' 
  AND sy.status;"

# Anschlussleitungen löschen
sync_anschlussleitungen_del: "
DELETE FROM main.anschlussleitungen
WHERE pk IN (
    SELECT pk_best
    FROM sync_anschlussleitungen
    WHERE aktion = 'löschen'
      AND status
);"

# Anschlussleitungen ändern
sync_anschlussleitungen_mod: "
UPDATE main.anschlussleitungen
SET
    leitnam = mo.leitnam,
    schoben = mo.schoben,
    schunten = mo.schunten,
    hoehe = mo.hoehe,
    breite = mo.breite,
    laenge = mo.laenge,
    aussendurchmesser = mo.aussendurchmesser,
    sohleoben = mo.sohleoben,
    sohleunten = mo.sohleunten,
    baujahr = mo.baujahr,
    haltnam = mo.haltnam,
    urstation = mo.urstation,
    ursprung = mo.ursprung,
    anschlusstyp = mo.anschlusstyp,
    lageanschluss = mo.lageanschluss,
    teilgebiet = mo.teilgebiet,
    strasse = mo.strasse,
    profilnam = mo.profilnam,
    entwart = mo.entwart,
    material = mo.material,
    profilauskleidung = mo.profilauskleidung,
    innenmaterial = mo.innenmaterial,
    ks = mo.ks,
    simstatus = mo.simstatus,
    xschob = mo.xschob,
    yschob = mo.yschob,
    xschun = mo.xschun,
    yschun = mo.yschun,
    kommentar = mo.kommentar,
    geom = mo.geom
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.leitnam IS NOT NULL AND sy.leitnam <> '', ex.leitnam, be.leitnam) AS leitnam,
        iif(sy.schoben IS NOT NULL AND sy.schoben <> '', ex.schoben, be.schoben) AS schoben,
        iif(sy.schunten IS NOT NULL AND sy.schunten <> '', ex.schunten, be.schunten) AS schunten,
        iif(sy.hoehe IS NOT NULL, ex.hoehe, be.hoehe) AS hoehe,
        iif(sy.breite IS NOT NULL, ex.breite, be.breite) AS breite,
        iif(sy.laenge IS NOT NULL, ex.laenge, be.laenge) AS laenge,
        iif(sy.aussendurchmesser IS NOT NULL, ex.aussendurchmesser, be.aussendurchmesser) AS aussendurchmesser,
        iif(sy.sohleoben IS NOT NULL, ex.sohleoben, be.sohleoben) AS sohleoben,
        iif(sy.sohleunten IS NOT NULL, ex.sohleunten, be.sohleunten) AS sohleunten,
        iif(sy.baujahr IS NOT NULL, ex.baujahr, be.baujahr) AS baujahr,
        iif(sy.haltnam IS NOT NULL AND sy.haltnam <> '', ex.haltnam, be.haltnam) AS haltnam,
        iif(sy.urstation IS NOT NULL, ex.urstation, be.urstation) AS urstation,
        iif(sy.ursprung IS NOT NULL AND sy.ursprung <> '', ex.ursprung, be.ursprung) AS ursprung,
        iif(sy.anschlusstyp IS NOT NULL AND sy.anschlusstyp <> '', ex.anschlusstyp, be.anschlusstyp) AS anschlusstyp,
        iif(sy.lageanschluss IS NOT NULL, ex.lageanschluss, be.lageanschluss) AS lageanschluss,
        iif(sy.teilgebiet IS NOT NULL AND sy.teilgebiet <> '', ex.teilgebiet, be.teilgebiet) AS teilgebiet,
        iif(sy.strasse IS NOT NULL AND sy.strasse <> '', ex.strasse, be.strasse) AS strasse,
        iif(sy.profilnam IS NOT NULL AND sy.profilnam <> '', ex.profilnam, be.profilnam) AS profilnam,
        iif(sy.entwart IS NOT NULL AND sy.entwart <> '', ex.entwart, be.entwart) AS entwart,
        iif(sy.material IS NOT NULL AND sy.material <> '', ex.material, be.material) AS material,
        iif(sy.profilauskleidung IS NOT NULL AND sy.profilauskleidung <> '', ex.profilauskleidung, be.profilauskleidung) AS profilauskleidung,
        iif(sy.innenmaterial IS NOT NULL AND sy.innenmaterial <> '', ex.innenmaterial, be.innenmaterial) AS innenmaterial,
        iif(sy.ks IS NOT NULL, ex.ks, be.ks) AS ks,
        iif(sy.simstatus IS NOT NULL AND sy.simstatus <> '', ex.simstatus, be.simstatus) AS simstatus,
        iif(sy.xschob IS NOT NULL, ex.xschob, be.xschob) AS xschob,
        iif(sy.yschob IS NOT NULL, ex.yschob, be.yschob) AS yschob,
        iif(sy.xschun IS NOT NULL, ex.xschun, be.xschun) AS xschun,
        iif(sy.yschun IS NOT NULL, ex.yschun, be.yschun) AS yschun,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geom, be.geom) AS geom
    FROM sync_anschlussleitungen AS sy
    JOIN main.anschlussleitungen AS be ON be.pk = sy.pk_best
    JOIN ext.anschlussleitungen AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.anschlussleitungen.pk = mo.pk_best;"

