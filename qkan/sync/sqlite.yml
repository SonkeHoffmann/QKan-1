    ursprung TEXT,
    anschlusstyp TEXT,
    lageanschluss INTEGER,
    teilgebiet TEXT,
    strasse TEXT,
    profilnam TEXT,
    entwart TEXT,
    material TEXT,
    profilauskleidung TEXT,
    innenmaterial TEXT,
    ks REAL,
    simstatus TEXT,
    xschob REAL,
    yschob REAL,
    xschun REAL,
    yschun REAL,
    kommentar TEXT);"

sync_create_anschlussleitungen_geom: "
