sync_create_haltungen_untersucht: "
CREATE TABLE IF NOT EXISTS sync_haltungen_untersucht (
    pk INTEGER PRIMARY KEY,
    pk_best INTEGER,
    pk_ext INTEGER,
    aktion TEXT,
    status INTEGER,
    objekt TEXT,
    haltnam TEXT,
    bezugspunkt TEXT,
    schoben TEXT,
    schunten TEXT,
    hoehe REAL,
    breite REAL,
    laenge REAL,
    baujahr INTEGER,
    id INTEGER,
    untersuchtag TEXT,
    untersucher TEXT,
    untersuchrichtung TEXT,
    wetter INTEGER,
    bewertungsart TEXT,
    bewertungstag TEXT,
    strasse TEXT,
    datenart TEXT,
    auftragsbezeichnung TEXT,
    max_ZD INTEGER,
    max_ZB INTEGER,
    max_ZS INTEGER,
    xschob REAL,
    yschob REAL,
    xschun REAL,
    yschun REAL,
    kommentar TEXT);"

sync_create_haltungen_untersucht_geom: "
SELECT AddGeometryColumn('sync_haltungen_untersucht', 'geom', :epsg, 'LINESTRING', 2);"

sync_reset_haltungen_untersucht: "
DELETE FROM sync_haltungen_untersucht;"

# Haltungen_Untersucht, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_haltungen_untersucht_ext: "
INSERT INTO sync_haltungen_untersucht (
    pk_best, pk_ext, haltnam, objekt, aktion, status,
    haltnam, bezugspunkt, schoben, schunten, hoehe, breite, laenge,
    baujahr, id, untersuchtag, untersucher, untersuchrichtung, wetter,
    bewertungsart, bewertungstag, strasse, datenart, auftragsbezeichnung,
    max_ZD, max_ZB, max_ZS, xschob, yschob, xschun, yschun, kommentar,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.haltnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */ 
    ex.haltnam, ex.bezugspunkt, ex.schoben, ex.schunten, ex.hoehe, ex.breite,
    ex.laenge, ex.baujahr, ex.id, ex.untersuchtag, ex.untersucher,
    ex.untersuchrichtung, ex.wetter, ex.bewertungsart, ex.bewertungstag,
    ex.strasse, ex.datenart, ex.auftragsbezeichnung, ex.max_ZD, ex.max_ZB,
    ex.max_ZS, ex.xschob, ex.yschob, ex.xschun, ex.yschun, ex.kommentar,
    ex.geom AS geom
FROM (
    SELECT * 
    FROM ext.haltungen_untersucht AS t
    GROUP BY t.haltnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.haltungen_untersucht AS t
    GROUP BY t.haltnam
    HAVING count() = 1
) AS be
ON be.haltnam = ex.haltnam
WHERE be.pk IS NULL;"

