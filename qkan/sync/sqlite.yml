    be.aussendurchmesser, be.sohleoben, be.sohleunten, be.baujahr,
    be.haltnam, be.urstation, be.ursprung, be.anschlusstyp,
    be.lageanschluss, be.teilgebiet, be.strasse, be.profilnam, be.entwart,
