# Anschlussschaechte, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_anschlussschaechte_ext: "
INSERT INTO sync_anschlussschaechte (
    pk_best, pk_ext, schnam, objekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, entwart, strasse, baujahr,
    eigentum, teilgebiet, simstatus, material, xsch, ysch, kommentar,
    createdat,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.schnam,
    'Datensatz nicht im Bestand' AS objekt, 'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.sohlhoehe, ex.deckelhoehe, ex.durchm, ex.druckdicht, ex.entwart,
    ex.strasse, ex.baujahr, ex.eigentum, ex.teilgebiet, ex.simstatus,
    ex.material, ex.xsch, ex.ysch, ex.kommentar, ex.createdat,
    ex.geom
FROM (
    SELECT * 
    FROM ext.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
ON be.schnam = ex.schnam
WHERE be.pk IS NULL;"

