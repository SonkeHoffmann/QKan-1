# Anschlussschaechte
sync_create_anschlussschaechte: "
CREATE TABLE IF NOT EXISTS sync_anschlussschaechte (
    pk INTEGER PRIMARY KEY,
    pk_best INTEGER,
    pk_ext INTEGER,
    aktion TEXT,
    status INTEGER,
    objekt TEXT,
    schnam TEXT,
    sohlhoehe REAL,
    deckelhoehe REAL,
    durchm REAL,
    druckdicht INTEGER,
    entwart TEXT,
    strasse TEXT,
    baujahr INTEGER,
    haltnam TEXT,
    urstation REAL,
    ursprung TEXT,
    anschlusstyp TEXT,
    eigentum TEXT,
    teilgebiet TEXT,
    simstatus TEXT,
    material TEXT,
    xsch REAL,
    ysch REAL,
    kommentar TEXT);"

sync_create_anschlussschaechte_geom: "
SELECT AddGeometryColumn('sync_anschlussschaechte', 'geom', :epsg, 'POINT', 2);"

sync_reset_anschlussschaechte: "
DELETE FROM sync_anschlussschaechte;"

# Anschlussschaechte, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_anschlussschaechte_ext: "
INSERT INTO sync_anschlussschaechte (
    pk_best, pk_ext, schnam, objekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, entwart, strasse, baujahr,
    haltnam, urstation, ursprung, anschlusstyp, eigentum, teilgebiet,
    simstatus, material, xsch, ysch, kommentar,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.schnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.sohlhoehe, ex.deckelhoehe, ex.durchm, ex.druckdicht, ex.entwart,
    ex.strasse, ex.baujahr, ex.haltnam, ex.urstation, ex.ursprung,
    ex.anschlusstyp, ex.eigentum, ex.teilgebiet, ex.simstatus,
    ex.material, ex.xsch, ex.ysch, ex.kommentar,
    ex.geom AS geom
FROM (
    SELECT * 
    FROM ext.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
ON be.schnam = ex.schnam
WHERE be.pk IS NULL;"

