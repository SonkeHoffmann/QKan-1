        iif(sy.auftragsbezeichnung IS NOT NULL AND sy.auftragsbezeichnung <> '', ex.auftragsbezeichnung, be.auftragsbezeichnung) AS auftragsbezeichnung,
        iif(sy.max_ZD IS NOT NULL, ex.max_ZD, be.max_ZD) AS max_ZD,
        iif(sy.max_ZB IS NOT NULL, ex.max_ZB, be.max_ZB) AS max_ZB,
        iif(sy.max_ZS IS NOT NULL, ex.max_ZS, be.max_ZS) AS max_ZS,
        iif(sy.xschob IS NOT NULL, ex.xschob, be.xschob) AS xschob,
        iif(sy.yschob IS NOT NULL, ex.yschob, be.yschob) AS yschob,
        iif(sy.xschun IS NOT NULL, ex.xschun, be.xschun) AS xschun,
        iif(sy.yschun IS NOT NULL, ex.yschun, be.yschun) AS yschun,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.geom, be.geom) AS geom
    FROM sync_haltungen_untersucht AS sy
    JOIN main.haltungen_untersucht AS be ON be.pk = sy.pk_best
    JOIN ext.haltungen_untersucht AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.haltungen_untersucht.pk = mo.pk_best;"

