sync_anschlussleitungen_untersucht_mod: "
UPDATE main.anschlussleitungen_untersucht
SET
    bezugspunkt = mo.bezugspunkt,
    schoben = mo.schoben,
    schunten = mo.schunten,
    hoehe = mo.hoehe,
