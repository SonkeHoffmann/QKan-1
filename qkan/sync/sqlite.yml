    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.untersuchdat_anschlussleitung AS t
    GROUP BY t.untersuchleit
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.untersuchdat_anschlussleitung AS t
    GROUP BY t.untersuchleit
    HAVING count() = 1
) AS ex
ON ex.untersuchleit = be.untersuchleit
WHERE
    be.untersuchleit <> ex.untersuchleit OR
    be.schoben <> ex.schoben OR
    be.schunten <> ex.schunten OR
    be.id <> ex.id OR
    be.untersuchtag <> ex.untersuchtag OR
    be.bandnr <> ex.bandnr OR
    be.videozaehler <> ex.videozaehler OR
    coalesce(abs(be.inspektionslaenge - ex.inspektionslaenge), 0) > 0.001 OR
    coalesce(abs(be.station - ex.station), 0) > 0.001 OR
    coalesce(abs(be.stationtext - ex.stationtext), 0) > 0.001 OR
    be.timecode <> ex.timecode OR
    coalesce(abs(be.video_offset - ex.video_offset), 0) > 0.001 OR
    be.langtext <> ex.langtext OR
    be.kuerzel <> ex.kuerzel OR
    be.charakt1 <> ex.charakt1 OR
    be.charakt2 <> ex.charakt2 OR
    coalesce(abs(be.quantnr1 - ex.quantnr1), 0) > 0.001 OR
    coalesce(abs(be.quantnr2 - ex.quantnr2), 0) > 0.001 OR
    be.streckenschaden <> ex.streckenschaden OR
    be.streckenschaden_lfdnr <> ex.streckenschaden_lfdnr OR
    be.pos_von <> ex.pos_von OR
    be.pos_bis <> ex.pos_bis OR
    be.foto_dateiname <> ex.foto_dateiname OR
    be.film_dateiname <> ex.film_dateiname OR
    be.ordner_bild <> ex.ordner_bild OR
    be.ordner_video <> ex.ordner_video OR
