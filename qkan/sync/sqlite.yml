# Haltungen_Untersucht mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_haltungen_untersucht_dif: "
INSERT INTO sync_haltungen_untersucht (
    pk_best, pk_ext, haltnam, objekt, aktion, status,
    bezugspunkt, schoben, schunten, hoehe, breite, laenge, baujahr, id,
    untersuchtag, untersucher, untersuchrichtung, wetter, bewertungsart,
    bewertungstag, strasse, datenart, auftragsbezeichnung, max_ZD, max_ZB,
    max_ZS, xschob, yschob, xschun, yschun, kommentar,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.haltnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.bezugspunkt <> ex.bezugspunkt, printf('%s -> %s', be.bezugspunkt, ex.bezugspunkt), NULL) AS bezugspunkt,
    iif(be.schoben <> ex.schoben, printf('%s -> %s', be.schoben, ex.schoben), NULL) AS schoben,
    iif(be.schunten <> ex.schunten, printf('%s -> %s', be.schunten, ex.schunten), NULL) AS schunten,
    iif(coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001, printf('%.3f -> %.3f', be.hoehe, ex.hoehe), NULL) AS hoehe,
    iif(coalesce(abs(be.breite - ex.breite), 0) > 0.001, printf('%.3f -> %.3f', be.breite, ex.breite), NULL) AS breite,
    iif(coalesce(abs(be.laenge - ex.laenge), 0) > 0.001, printf('%.3f -> %.3f', be.laenge, ex.laenge), NULL) AS laenge,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.id <> ex.id, printf('%d -> %d', be.id, ex.id), NULL) AS id,
    iif(be.untersuchtag <> ex.untersuchtag, printf('%s -> %s', be.untersuchtag, ex.untersuchtag), NULL) AS untersuchtag,
    iif(be.untersucher <> ex.untersucher, printf('%s -> %s', be.untersucher, ex.untersucher), NULL) AS untersucher,
    iif(be.untersuchrichtung <> ex.untersuchrichtung, printf('%s -> %s', be.untersuchrichtung, ex.untersuchrichtung), NULL) AS untersuchrichtung,
    iif(be.wetter <> ex.wetter, printf('%d -> %d', be.wetter, ex.wetter), NULL) AS wetter,
    iif(be.bewertungsart <> ex.bewertungsart, printf('%s -> %s', be.bewertungsart, ex.bewertungsart), NULL) AS bewertungsart,
    iif(be.bewertungstag <> ex.bewertungstag, printf('%s -> %s', be.bewertungstag, ex.bewertungstag), NULL) AS bewertungstag,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.datenart <> ex.datenart, printf('%s -> %s', be.datenart, ex.datenart), NULL) AS datenart,
    iif(be.auftragsbezeichnung <> ex.auftragsbezeichnung, printf('%s -> %s', be.auftragsbezeichnung, ex.auftragsbezeichnung), NULL) AS auftragsbezeichnung,
    iif(be.max_ZD <> ex.max_ZD, printf('%d -> %d', be.max_ZD, ex.max_ZD), NULL) AS max_ZD,
    iif(be.max_ZB <> ex.max_ZB, printf('%d -> %d', be.max_ZB, ex.max_ZB), NULL) AS max_ZB,
    iif(be.max_ZS <> ex.max_ZS, printf('%d -> %d', be.max_ZS, ex.max_ZS), NULL) AS max_ZS,
    iif(coalesce(abs(be.xschob - ex.xschob), 0) > 0.001, printf('%.3f -> %.3f', be.xschob, ex.xschob), NULL) AS xschob,
    iif(coalesce(abs(be.yschob - ex.yschob), 0) > 0.001, printf('%.3f -> %.3f', be.yschob, ex.yschob), NULL) AS yschob,
    iif(coalesce(abs(be.xschun - ex.xschun), 0) > 0.001, printf('%.3f -> %.3f', be.xschun, ex.xschun), NULL) AS xschun,
    iif(coalesce(abs(be.yschun - ex.yschun), 0) > 0.001, printf('%.3f -> %.3f', be.yschun, ex.yschun), NULL) AS yschun,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.haltungen_untersucht AS t
    GROUP BY t.haltnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.haltungen_untersucht AS t
    GROUP BY t.haltnam
    HAVING count() = 1
) AS ex
ON ex.haltnam = be.haltnam
WHERE
    be.bezugspunkt <> ex.bezugspunkt OR
    be.schoben <> ex.schoben OR
    be.schunten <> ex.schunten OR
    coalesce(abs(be.hoehe - ex.hoehe), 0) > 0.001 OR
    coalesce(abs(be.breite - ex.breite), 0) > 0.001 OR
    coalesce(abs(be.laenge - ex.laenge), 0) > 0.001 OR
    be.baujahr <> ex.baujahr OR
    be.id <> ex.id OR
    be.untersuchtag <> ex.untersuchtag OR
    be.untersucher <> ex.untersucher OR
    be.untersuchrichtung <> ex.untersuchrichtung OR
    be.wetter <> ex.wetter OR
    be.bewertungsart <> ex.bewertungsart OR
    be.bewertungstag <> ex.bewertungstag OR
    be.strasse <> ex.strasse OR
    be.datenart <> ex.datenart OR
    be.auftragsbezeichnung <> ex.auftragsbezeichnung OR
    be.max_ZD <> ex.max_ZD OR
    be.max_ZB <> ex.max_ZB OR
    be.max_ZS <> ex.max_ZS OR
    coalesce(abs(be.xschob - ex.xschob), 0) > 0.001 OR
    coalesce(abs(be.yschob - ex.yschob), 0) > 0.001 OR
    coalesce(abs(be.xschun - ex.xschun), 0) > 0.001 OR
