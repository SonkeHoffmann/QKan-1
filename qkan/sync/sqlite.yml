# SQL name pattern for all tables:
#   sync_create_{table},
#   sync_create_{table}_geom,
#   sync_reset_{table},
#   sync_{table}_ext,
#   sync_{table}_local,
#   sync_{table}_dif,
#
#   sync_{table}_add,
#   sync_{table}_del,
#   sync_{table}_mod

sync_attach_ext: "
ATTACH DATABASE ? AS ext"

sync_collect_teilgebiete: "
WITH tgb AS (
    SELECT teilgebiet FROM flaechen
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM tezg
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM haltungen
    WHERE teilgebiet IS NOT NULL
    UNION
    SELECT teilgebiet FROM schaechte
    WHERE teilgebiet IS NOT NULL
)
INSERT INTO teilgebiete (tgnam)
SELECT teilgebiet FROM tgb
WHERE teilgebiet NOT IN (SELECT tgnam FROM teilgebiete)
GROUP BY teilgebiet"

sync_list_teilgebiete: "
SELECT tgnam FROM teilgebiete GROUP BY tgnam"

sync_create_sel_teilgebiete: "
CREATE TEMP TABLE IF NOT EXISTS sel_teilgebiete (tgnam TEXT PRIMARY KEY)"

sync_sel_teilgebiete_reset: "
DELETE FROM sel_teilgebiete;"

sync_sel_teilgebiete_add: "
INSERT INTO sel_teilgebiete VALUES (?);"


# Schaechte
sync_create_schaechte: "
CREATE TABLE IF NOT EXISTS sync_schaechte (
    pk INTEGER PRIMARY KEY,
    pk_best INTEGER,
    pk_ext INTEGER,
    aktion TEXT,
    status INTEGER,
    grafikobjekt TEXT,
    punktobjekt TEXT,
    schnam TEXT,
    sohlhoehe REAL,
    deckelhoehe REAL,
    durchm REAL,
    druckdicht INTEGER,
    ueberstauflaeche REAL,
    entwart TEXT,
    strasse TEXT,
    baujahr INTEGER,
    eigentum TEXT,
    teilgebiet TEXT,
    knotentyp TEXT,
    auslasstyp TEXT,
    schachttyp TEXT,
    simstatus TEXT,
    material TEXT,
    xsch REAL,
    ysch REAL,
    kommentar TEXT,
    createdat TEXT DEFAULT CURRENT_TIMESTAMP);"

sync_create_schaechte_geom: "
SELECT AddGeometryColumn('sync_schaechte', 'geom', :epsg, 'POINT', 2);"

sync_reset_schaechte: "
DELETE FROM sync_schaechte;"

# Schaechte, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_schaechte_ext: "
INSERT INTO sync_schaechte (
    pk_best, pk_ext, schnam, grafikobjekt, punktobjekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche, entwart,
    strasse, baujahr, eigentum, teilgebiet, knotentyp, auslasstyp,
    schachttyp, simstatus, material, xsch, ysch, kommentar, createdat,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.schnam,
    NULL AS grafikobjekt, 'Datensatz nicht im Bestand' AS punktobjekt, 'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.sohlhoehe, ex.deckelhoehe, ex.durchm, ex.druckdicht,
    ex.ueberstauflaeche, ex.entwart, ex.strasse, ex.baujahr, ex.eigentum,
    ex.teilgebiet, ex.knotentyp, ex.auslasstyp, ex.schachttyp,
    ex.simstatus, ex.material, ex.xsch, ex.ysch, ex.kommentar,
    ex.createdat,
    ex.geop AS geom
FROM (
    SELECT * 
    FROM ext.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
ON be.schnam = ex.schnam
WHERE be.pk IS NULL;"

# Schaechte, die nur in der bestehenden Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_schaechte_local: "
INSERT INTO sync_schaechte (
    pk_best, pk_ext, schnam, grafikobjekt, punktobjekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche, entwart,
    strasse, baujahr, eigentum, teilgebiet, knotentyp, auslasstyp,
    schachttyp, simstatus, material, xsch, ysch, kommentar, createdat,
    geom)
SELECT
    be.pk AS pk_best, NULL AS pk_ext, be.schnam,
    NULL AS grafikobjekt,
    'Datensatz extern nicht vorhanden' AS punktobjekt,
    'löschen' AS aktion, 0 AS status,      /* löschen */
    be.sohlhoehe, be.deckelhoehe, be.durchm, be.druckdicht,
    be.ueberstauflaeche, be.entwart, be.strasse, be.baujahr, be.eigentum,
    be.teilgebiet, be.knotentyp, be.auslasstyp, be.schachttyp,
    be.simstatus, be.material, be.xsch, be.ysch, be.kommentar,
    be.createdat,
    be.geop AS geom
FROM (
    SELECT *
    FROM main.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
LEFT JOIN (
    SELECT * 
    FROM ext.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
ON be.schnam = ex.schnam
WHERE ex.pk IS NULL;"


# Schaechte mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
# geom wird zwar im Vergleich berücksichtigt, aber nicht in sync_schaechte gespeichert. Achtung sync_schachte.geom = schaechte.geop!
sync_schaechte_dif: "
INSERT INTO sync_schaechte (
    pk_best, pk_ext, schnam, grafikobjekt, punktobjekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche, entwart,
    strasse, baujahr, eigentum, teilgebiet, knotentyp, auslasstyp,
    schachttyp, simstatus, material, xsch, ysch, kommentar, createdat,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.schnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS grafikobjekt,
    iif(be.geop <> ex.geop, printf('Geometrie geändert'), NULL) AS punktobjekt,
    'ändern' AS aktion,
    1 AS status,
    iif(coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.sohlhoehe, ex.sohlhoehe), NULL) AS sohlhoehe,
    iif(coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.deckelhoehe, ex.deckelhoehe), NULL) AS deckelhoehe,
    iif(coalesce(abs(be.durchm - ex.durchm), 0) > 0.001, printf('%.3f -> %.3f', be.durchm, ex.durchm), NULL) AS durchm,
    iif(be.druckdicht <> ex.druckdicht, printf('%d -> %d', be.druckdicht, ex.druckdicht), NULL) AS druckdicht,
    iif(coalesce(abs(be.ueberstauflaeche - ex.ueberstauflaeche), 0) > 0.001, printf('%.3f -> %.3f', be.ueberstauflaeche, ex.ueberstauflaeche), NULL) AS ueberstauflaeche,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.eigentum <> ex.eigentum, printf('%s -> %s', be.eigentum, ex.eigentum), NULL) AS eigentum,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.knotentyp <> ex.knotentyp, printf('%s -> %s', be.knotentyp, ex.knotentyp), NULL) AS knotentyp,
    iif(be.auslasstyp <> ex.auslasstyp, printf('%s -> %s', be.auslasstyp, ex.auslasstyp), NULL) AS auslasstyp,
    iif(be.schachttyp <> ex.schachttyp, printf('%s -> %s', be.schachttyp, ex.schachttyp), NULL) AS schachttyp,
    iif(be.simstatus <> ex.simstatus, printf('%s -> %s', be.simstatus, ex.simstatus), NULL) AS simstatus,
    iif(be.material <> ex.material, printf('%s -> %s', be.material, ex.material), NULL) AS material,
    iif(coalesce(abs(be.xsch - ex.xsch), 0) > 0.001, printf('%.3f -> %.3f', be.xsch, ex.xsch), NULL) AS xsch,
    iif(coalesce(abs(be.ysch - ex.ysch), 0) > 0.001, printf('%.3f -> %.3f', be.ysch, ex.ysch), NULL) AS ysch,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    iif(abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5, printf('%s -> %s', be.createdat, ex.createdat), NULL) AS createdat,
    be.geop AS geom
FROM (
    SELECT *
    FROM main.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.schaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
ON ex.schnam = be.schnam
WHERE
    coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001 OR
    coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001 OR
    coalesce(abs(be.durchm - ex.durchm), 0) > 0.001 OR
    be.druckdicht <> ex.druckdicht OR
    coalesce(abs(be.ueberstauflaeche - ex.ueberstauflaeche), 0) > 0.001 OR
    be.entwart <> ex.entwart OR
    be.strasse <> ex.strasse OR
    be.baujahr <> ex.baujahr OR
    be.eigentum <> ex.eigentum OR
    be.teilgebiet <> ex.teilgebiet OR
    be.knotentyp <> ex.knotentyp OR
    be.auslasstyp <> ex.auslasstyp OR
    be.schachttyp <> ex.schachttyp OR
    be.simstatus <> ex.simstatus OR
    be.material <> ex.material OR
    coalesce(abs(be.xsch - ex.xsch), 0) > 0.001 OR
    coalesce(abs(be.ysch - ex.ysch), 0) > 0.001 OR
    be.kommentar <> ex.kommentar OR
    abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5 OR
    be.geom <> ex.geom OR
    be.geop <> ex.geop;"

# Schaechte hinzufügen
sync_schaechte_add: "
INSERT INTO main.schaechte (
    schnam, sohlhoehe, deckelhoehe, durchm, druckdicht, ueberstauflaeche, entwart,
    strasse, baujahr, eigentum, teilgebiet, knotentyp, auslasstyp,
    schachttyp, simstatus, material, xsch, ysch, kommentar, createdat,
    geom, geop)
SELECT
    ex.schnam, ex.sohlhoehe, ex.deckelhoehe, ex.durchm, ex.druckdicht,
    ex.ueberstauflaeche, ex.entwart, ex.strasse, ex.baujahr, ex.eigentum,
    ex.teilgebiet, ex.knotentyp, ex.auslasstyp, ex.schachttyp,
    ex.simstatus, ex.material, ex.xsch, ex.ysch, ex.kommentar,
    ex.createdat,
    CastToMultiLineString(ex.geom) AS geom, ex.geop
FROM ext.schaechte AS ex
JOIN sync_schaechte AS sy ON ex.pk = sy.pk_ext
WHERE sy.aktion = 'hinzufügen' 
  AND sy.status;"

# Schaechte löschen
sync_schaechte_del: "
DELETE FROM main.schaechte
WHERE pk IN (
    SELECT pk_best
    FROM sync_schaechte
    WHERE aktion = 'löschen'
      AND status
);"

# Schaechte ändern
sync_schaechte_mod: "
UPDATE main.schaechte
SET
    sohlhoehe = mo.sohlhoehe,
    deckelhoehe = mo.deckelhoehe,
    durchm = mo.durchm,
    druckdicht = mo.druckdicht,
    ueberstauflaeche = mo.ueberstauflaeche,
    entwart = mo.entwart,
    strasse = mo.strasse,
    baujahr = mo.baujahr,
    eigentum = mo.eigentum,
    teilgebiet = mo.teilgebiet,
    knotentyp = mo.knotentyp,
    auslasstyp = mo.auslasstyp,
    schachttyp = mo.schachttyp,
    simstatus = mo.simstatus,
    material = mo.material,
    xsch = mo.xsch,
    ysch = mo.ysch,
    kommentar = mo.kommentar,
    createdat = mo.createdat,
    geom = mo.geom,
    geop = mo.geop
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.sohlhoehe IS NOT NULL, ex.sohlhoehe, be.sohlhoehe) AS sohlhoehe,
        iif(sy.deckelhoehe IS NOT NULL, ex.deckelhoehe, be.deckelhoehe) AS deckelhoehe,
        iif(sy.durchm IS NOT NULL, ex.durchm, be.durchm) AS durchm,
        iif(sy.druckdicht IS NOT NULL, ex.druckdicht, be.druckdicht) AS druckdicht,
        iif(sy.ueberstauflaeche IS NOT NULL, ex.ueberstauflaeche, be.ueberstauflaeche) AS ueberstauflaeche,
        iif(sy.entwart IS NOT NULL AND sy.entwart <> '', ex.entwart, be.entwart) AS entwart,
        iif(sy.strasse IS NOT NULL AND sy.strasse <> '', ex.strasse, be.strasse) AS strasse,
        iif(sy.baujahr IS NOT NULL, ex.baujahr, be.baujahr) AS baujahr,
        iif(sy.eigentum IS NOT NULL AND sy.eigentum <> '', ex.eigentum, be.eigentum) AS eigentum,
        iif(sy.teilgebiet IS NOT NULL AND sy.teilgebiet <> '', ex.teilgebiet, be.teilgebiet) AS teilgebiet,
        iif(sy.knotentyp IS NOT NULL AND sy.knotentyp <> '', ex.knotentyp, be.knotentyp) AS knotentyp,
        iif(sy.auslasstyp IS NOT NULL AND sy.auslasstyp <> '', ex.auslasstyp, be.auslasstyp) AS auslasstyp,
        iif(sy.schachttyp IS NOT NULL AND sy.schachttyp <> '', ex.schachttyp, be.schachttyp) AS schachttyp,
        iif(sy.simstatus IS NOT NULL AND sy.simstatus <> '', ex.simstatus, be.simstatus) AS simstatus,
        iif(sy.material IS NOT NULL AND sy.material <> '', ex.material, be.material) AS material,
        iif(sy.xsch IS NOT NULL, ex.xsch, be.xsch) AS xsch,
        iif(sy.ysch IS NOT NULL, ex.ysch, be.ysch) AS ysch,
        iif(sy.kommentar IS NOT NULL AND sy.kommentar <> '', ex.kommentar, be.kommentar) AS kommentar,
        iif(sy.createdat IS NOT NULL AND sy.createdat <> '', ex.createdat, be.createdat) AS createdat,
        iif(sy.grafikobjekt IS NOT NULL AND sy.grafikobjekt <> '', CastToMultiLineString(ex.geom), CastToMultiLineString(be.geom)) AS geom,
        iif(sy.punktobjekt IS NOT NULL AND sy.punktobjekt <> '', ex.geop, be.geop) AS geop      /* only geom in table sync */
    FROM sync_schaechte AS sy
    JOIN main.schaechte AS be ON be.pk = sy.pk_best
    JOIN ext.schaechte AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.schaechte.pk = mo.pk_best;"

# Schaechte auflisten
sync_schaechte_prot: "
SELECT * FROM sync_schaechte WHERE status;"


# Haltungen
sync_create_haltungen: "
CREATE TABLE IF NOT EXISTS sync_haltungen (
    pk INTEGER PRIMARY KEY,
    pk_best INTEGER,
    pk_ext INTEGER,
    aktion TEXT,
    status INTEGER,
    objekt TEXT,
    haltnam TEXT,
    schoben TEXT,
    schunten TEXT,
    hoehe REAL,
    breite REAL,
    laenge REAL,
    aussendurchmesser REAL,
    sohleoben REAL,
    sohleunten REAL,
    baujahr INT,
    eigentum TEXT,
    teilgebiet TEXT,
    strasse TEXT,
    profilnam TEXT,
    entwart TEXT,
    material TEXT,
    profilauskleidung TEXT,
    innenmaterial TEXT,
    ks REAL,
    haltungstyp TEXT,
    simstatus TEXT,
    rwanschluss INTEGER,
    druckdicht INTEGER,
    xschob REAL,
    yschob REAL,
    xschun REAL,
    yschun REAL,
    kommentar TEXT,
    createdat TEXT DEFAULT CURRENT_TIMESTAMP);"

sync_create_haltungen_geom: "
SELECT AddGeometryColumn('sync_haltungen', 'geom', :epsg, 'LINESTRING', 2);"

sync_reset_haltungen: "
DELETE FROM sync_haltungen;"

# Haltungen, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_haltungen_ext: "
INSERT INTO sync_haltungen (
    pk_best, pk_ext, haltnam, objekt, aktion, status,
    schoben, schunten, hoehe, breite, laenge, aussendurchmesser,
    sohleoben, sohleunten, baujahr, eigentum, teilgebiet, strasse,
    profilnam, entwart, material, profilauskleidung, innenmaterial, ks,
    haltungstyp, simstatus, rwanschluss, druckdicht, xschob, yschob,
    xschun, yschun, kommentar, createdat,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.haltnam,
    'Datensatz nicht im Bestand' AS objekt, 'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */
    ex.schoben, ex.schunten, ex.hoehe, ex.breite, ex.laenge,
    ex.aussendurchmesser, ex.sohleoben, ex.sohleunten, ex.baujahr,
    ex.eigentum, ex.teilgebiet, ex.strasse, ex.profilnam, ex.entwart,
    ex.material, ex.profilauskleidung, ex.innenmaterial, ex.ks,
    ex.haltungstyp, ex.simstatus, ex.rwanschluss, ex.druckdicht,
    ex.xschob, ex.yschob, ex.xschun, ex.yschun, ex.kommentar, ex.createdat,
    ex.geom
FROM (
    SELECT * 
    FROM ext.haltungen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.haltnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.haltungen AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.haltnam
    HAVING count() = 1
) AS be
ON be.haltnam = ex.haltnam
WHERE be.pk IS NULL;"

