# Videos
sync_create_videos: "
CREATE TABLE IF NOT EXISTS sync_videos (
    pk INTEGER PRIMARY KEY,
    pk_best INTEGER,
    pk_ext INTEGER,
    aktion TEXT,
    status INTEGER,
    name TEXT,
    untersuchtag TEXT,
    objekt TEXT,
    datei TEXT);"


sync_reset_videos: "
DELETE FROM sync_videos;"

# Videos, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_videos_ext: "
INSERT INTO sync_videos (
    pk_best, pk_ext, name, aktion, status,
    name, untersuchtag, objekt, datei)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.name,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */ 
    ex.name, ex.untersuchtag, ex.objekt, ex.datei
FROM (
    SELECT * 
    FROM ext.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS be
ON be.name = ex.name
WHERE be.pk IS NULL;"

# Videos, die nur in der bestehenden Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_videos_local: "
INSERT INTO sync_videos (
    pk_best, pk_ext, name, aktion, status,
    name, untersuchtag, objekt, datei)
SELECT
    be.pk AS pk_best, NULL AS pk_ext, be.name,
    'löschen' AS aktion, 0 AS status,      /* löschen */
    be.name, be.untersuchtag, be.objekt, be.datei
FROM (
    SELECT *
    FROM main.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS be
LEFT JOIN (
    SELECT * 
    FROM ext.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS ex
ON be.name = ex.name
WHERE ex.pk IS NULL;"


# Videos mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_videos_dif: "
INSERT INTO sync_videos (
    pk_best, pk_ext, name, aktion, status,
    name, untersuchtag, objekt, datei)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.name,
    'ändern' AS aktion,
    1 AS status,
    iif(be.name <> ex.name, printf('%s -> %s', be.name, ex.name), NULL) AS name,
    iif(be.untersuchtag <> ex.untersuchtag, printf('%s -> %s', be.untersuchtag, ex.untersuchtag), NULL) AS untersuchtag,
    iif(be.objekt <> ex.objekt, printf('%s -> %s', be.objekt, ex.objekt), NULL) AS objekt,
    iif(be.datei <> ex.datei, printf('%s -> %s', be.datei, ex.datei), NULL) AS datei
FROM (
    SELECT *
    FROM main.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.videos AS t
    GROUP BY t.name
    HAVING count() = 1
) AS ex
ON ex.name = be.name
WHERE
    be.name <> ex.name OR
    be.untersuchtag <> ex.untersuchtag OR
    be.objekt <> ex.objekt OR
    be.datei <> ex.datei;"

# Videos hinzufügen
sync_videos_add: "
INSERT INTO main.videos (
    name, name, untersuchtag, objekt, datei)
SELECT
