    streckenschaden = mo.streckenschaden,
    streckenschaden_lfdnr = mo.streckenschaden_lfdnr,
    pos_von = mo.pos_von,
    pos_bis = mo.pos_bis,
    vertikale_lage = mo.vertikale_lage,
    inspektionslaenge = mo.inspektionslaenge,
    bereich = mo.bereich,
    foto_dateiname = mo.foto_dateiname,
    ordner_bild = mo.ordner_bild,
    film_dateiname = mo.film_dateiname,
    ordner_video = mo.ordner_video,
    filmtyp = mo.filmtyp,
    video_start = mo.video_start,
    video_ende = mo.video_ende,
    ZD = mo.ZD,
    ZB = mo.ZB,
    ZS = mo.ZS,
    kommentar = mo.kommentar,
