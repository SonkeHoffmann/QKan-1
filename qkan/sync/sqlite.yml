# Linkfl mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_linkfl_dif: "
INSERT INTO sync_linkfl (
    pk_best, pk_ext, flnam, objekt, aktion, status,
    haltnam, schnam, tezgnam, teilgebiet, abflusstyp, speicherzahl,
    speicherkonst, fliesszeitkanal, fliesszeitflaeche,
    glink)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.flnam,
    iif(be.glink <> ex.glink, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(be.haltnam <> ex.haltnam, printf('%s -> %s', be.haltnam, ex.haltnam), NULL) AS haltnam,
    iif(be.schnam <> ex.schnam, printf('%s -> %s', be.schnam, ex.schnam), NULL) AS schnam,
    iif(be.tezgnam <> ex.tezgnam, printf('%s -> %s', be.tezgnam, ex.tezgnam), NULL) AS tezgnam,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.abflusstyp <> ex.abflusstyp, printf('%s -> %s', be.abflusstyp, ex.abflusstyp), NULL) AS abflusstyp,
    iif(be.speicherzahl <> ex.speicherzahl, printf('%d -> %d', be.speicherzahl, ex.speicherzahl), NULL) AS speicherzahl,
    iif(coalesce(abs(be.speicherkonst - ex.speicherkonst), 0) > 0.001, printf('%.3f -> %.3f', be.speicherkonst, ex.speicherkonst), NULL) AS speicherkonst,
    iif(coalesce(abs(be.fliesszeitkanal - ex.fliesszeitkanal), 0) > 0.001, printf('%.3f -> %.3f', be.fliesszeitkanal, ex.fliesszeitkanal), NULL) AS fliesszeitkanal,
    iif(coalesce(abs(be.fliesszeitflaeche - ex.fliesszeitflaeche), 0) > 0.001, printf('%.3f -> %.3f', be.fliesszeitflaeche, ex.fliesszeitflaeche), NULL) AS fliesszeitflaeche,
    be.glink AS glink
FROM (
    SELECT *
    FROM main.linkfl AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.linkfl AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.flnam
    HAVING count() = 1
) AS ex
ON ex.flnam = be.flnam
WHERE
    be.haltnam <> ex.haltnam OR
    be.schnam <> ex.schnam OR
    be.tezgnam <> ex.tezgnam OR
    be.teilgebiet <> ex.teilgebiet OR
    be.abflusstyp <> ex.abflusstyp OR
    be.speicherzahl <> ex.speicherzahl OR
    coalesce(abs(be.speicherkonst - ex.speicherkonst), 0) > 0.001 OR
    coalesce(abs(be.fliesszeitkanal - ex.fliesszeitkanal), 0) > 0.001 OR
    coalesce(abs(be.fliesszeitflaeche - ex.fliesszeitflaeche), 0) > 0.001 OR
    be.glink <> ex.glink;"

# Linkfl hinzufügen
sync_linkfl_add: "
