# Anschlussschaechte mit gleichem Namen, die sich in mindestens einem Attribut unterscheiden
sync_anschlussschaechte_dif: "
INSERT INTO sync_anschlussschaechte (
    pk_best, pk_ext, schnam, objekt, aktion, status,
    sohlhoehe, deckelhoehe, durchm, druckdicht, entwart, strasse, baujahr,
    eigentum, teilgebiet, simstatus, material, xsch, ysch, kommentar,
    createdat,
    geom)
SELECT
    be.pk AS pk_best,
    ex.pk AS pk_ext,
    ex.schnam,
    iif(be.geom <> ex.geom, printf('Geometrie geändert'), NULL) AS objekt,
    'ändern' AS aktion,
    1 AS status,
    iif(coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.sohlhoehe, ex.sohlhoehe), NULL) AS sohlhoehe,
    iif(coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001, printf('%.3f -> %.3f', be.deckelhoehe, ex.deckelhoehe), NULL) AS deckelhoehe,
    iif(coalesce(abs(be.durchm - ex.durchm), 0) > 0.001, printf('%.3f -> %.3f', be.durchm, ex.durchm), NULL) AS durchm,
    iif(be.druckdicht <> ex.druckdicht, printf('%d -> %d', be.druckdicht, ex.druckdicht), NULL) AS druckdicht,
    iif(be.entwart <> ex.entwart, printf('%s -> %s', be.entwart, ex.entwart), NULL) AS entwart,
    iif(be.strasse <> ex.strasse, printf('%s -> %s', be.strasse, ex.strasse), NULL) AS strasse,
    iif(be.baujahr <> ex.baujahr, printf('%d -> %d', be.baujahr, ex.baujahr), NULL) AS baujahr,
    iif(be.eigentum <> ex.eigentum, printf('%s -> %s', be.eigentum, ex.eigentum), NULL) AS eigentum,
    iif(be.teilgebiet <> ex.teilgebiet, printf('%s -> %s', be.teilgebiet, ex.teilgebiet), NULL) AS teilgebiet,
    iif(be.simstatus <> ex.simstatus, printf('%s -> %s', be.simstatus, ex.simstatus), NULL) AS simstatus,
    iif(be.material <> ex.material, printf('%s -> %s', be.material, ex.material), NULL) AS material,
    iif(coalesce(abs(be.xsch - ex.xsch), 0) > 0.001, printf('%.3f -> %.3f', be.xsch, ex.xsch), NULL) AS xsch,
    iif(coalesce(abs(be.ysch - ex.ysch), 0) > 0.001, printf('%.3f -> %.3f', be.ysch, ex.ysch), NULL) AS ysch,
    iif(be.kommentar <> ex.kommentar, printf('%s -> %s', be.kommentar, ex.kommentar), NULL) AS kommentar,
    iif(abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5, printf('%s -> %s', be.createdat, ex.createdat), NULL) AS createdat,
    be.geom AS geom
FROM (
    SELECT *
    FROM main.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS be
JOIN (
    SELECT * 
    FROM ext.anschlussschaechte AS t
    WHERE NOT :seltgb
       OR t.teilgebiet IN (SELECT tgnam FROM sel_teilgebiete)
    GROUP BY t.schnam
    HAVING count() = 1
) AS ex
ON ex.schnam = be.schnam
WHERE
    coalesce(abs(be.sohlhoehe - ex.sohlhoehe), 0) > 0.001 OR
    coalesce(abs(be.deckelhoehe - ex.deckelhoehe), 0) > 0.001 OR
    coalesce(abs(be.durchm - ex.durchm), 0) > 0.001 OR
    be.druckdicht <> ex.druckdicht OR
    be.entwart <> ex.entwart OR
    be.strasse <> ex.strasse OR
    be.baujahr <> ex.baujahr OR
    be.eigentum <> ex.eigentum OR
    be.teilgebiet <> ex.teilgebiet OR
    be.simstatus <> ex.simstatus OR
    be.material <> ex.material OR
    coalesce(abs(be.xsch - ex.xsch), 0) > 0.001 OR
    coalesce(abs(be.ysch - ex.ysch), 0) > 0.001 OR
    be.kommentar <> ex.kommentar OR
    abs(Julianday(be.createdat) - Julianday(ex.createdat)) > 0.5 OR
    be.geom <> ex.geom;"

