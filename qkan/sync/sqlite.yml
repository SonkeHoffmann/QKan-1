# Videos ändern
sync_videos_mod: "
UPDATE main.videos
SET
    name = mo.name,
    untersuchtag = mo.untersuchtag,
    objekt = mo.objekt,
    datei = mo.datei
FROM (
    SELECT
        sy.pk_best AS pk_best,
        iif(sy.name IS NOT NULL AND sy.name <> '', ex.name, be.name) AS name,
        iif(sy.untersuchtag IS NOT NULL AND sy.untersuchtag <> '', ex.untersuchtag, be.untersuchtag) AS untersuchtag,
        iif(sy.objekt IS NOT NULL AND sy.objekt <> '', ex.objekt, be.objekt) AS objekt,
        iif(sy.datei IS NOT NULL AND sy.datei <> '', ex.datei, be.datei) AS datei
    FROM sync_videos AS sy
    JOIN main.videos AS be ON be.pk = sy.pk_best
    JOIN ext.videos AS ex ON ex.pk = sy.pk_ext
    WHERE sy.aktion = 'ändern'
      AND status
) AS mo
WHERE main.videos.pk = mo.pk_best;"

