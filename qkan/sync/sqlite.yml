# Linkageb, die nur in der externen Datenbank vorkommen, Vergleich anhand Objektbezeichnung
sync_linkageb_ext: "
INSERT INTO sync_linkageb (
    pk_best, pk_ext, gebnam, objekt, aktion, status,
    gebnam, schnam,
    geom)
SELECT 
    NULL AS pk_best, ex.pk AS pk_ext, ex.gebnam,
    'Datensatz nicht im Bestand' AS objekt,
    'hinzufügen' AS aktion, 1 AS status,      /* hinzufügen */ 
    ex.gebnam, ex.schnam,
    ex.glink AS glink
FROM (
    SELECT * 
    FROM ext.linkageb AS t
    GROUP BY t.gebnam
    HAVING count() = 1
) AS ex
LEFT JOIN (
    SELECT *
    FROM main.linkageb AS t
    GROUP BY t.gebnam
    HAVING count() = 1
) AS be
ON be.gebnam = ex.gebnam
WHERE be.pk IS NULL;"

