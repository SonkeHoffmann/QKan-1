    rw_rohrende REAL,
    hw_rohrende REAL,
    zuflussnummer1 INTEGER,
    zuflussnummer2 INTEGER,
    zuflussnummer3 INTEGER,
    zuflussnummer4 INTEGER,
    zuflussnummer5 INTEGER,
    zuflussnummer6 INTEGER,
    zuflussnummer7 INTEGER,
    zuflussnummer8 INTEGER,
    abflussnummer1 INTEGER,
    abflussnummer2 INTEGER,
    abflussnummer3 INTEGER,
    abflussnummer4 INTEGER,
    abflussnummer5 INTEGER,
    schacht_oben TEXT,
    schacht_unten TEXT,
    haltungsname TEXT,
    rohrbreite_v REAL,
    rohrhoehe___v REAL,
    flaechenfactor_v REAL,
    deckel_oben_v REAL,
    deckel_unten_v REAL,
    sohle_oben___v REAL,
    sohle_unten__v REAL,
    s_sohle_oben_v REAL,           /* Position in Datei kanal.rwtopen unbekannt */
    sohle_zufluss1 REAL,
    sohle_zufluss2 REAL,
    sohle_zufluss3 REAL,
    sohle_zufluss4 REAL,
    sohle_zufluss5 REAL,
    sohle_zufluss6 REAL,
    sohle_zufluss7 REAL,
    sohle_zufluss8 REAL,
    kanalart INTEGER,
    profilart_v INTEGER,
    material_v INTEGER,
    e_gebiet INTEGER,
    strassennummer INTEGER,
    schachtnummer INTEGER,
    schachtart INTEGER,
    berichtsnummer INTEGER,
    laenge REAL,
    schachtmaterial INTEGER,
    oberflaeche INTEGER,
    baujahr INTEGER,
    wasserschutz INTEGER,
    eigentum INTEGER,
    naechste_halt INTEGER,
    rueckadresse INTEGER,
    strangnr INTEGER,
    betriebspunkt INTEGER,
    strakatid TEXT);"

